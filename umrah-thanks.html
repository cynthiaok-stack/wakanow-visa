<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed — Wakanow Umrah</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',system-ui,sans-serif;font-size:16px;color:#1E3138;line-height:1.55;background:#F5F7FA;min-height:100vh}
h1,h2{font-family:'Rubik',system-ui,sans-serif;font-weight:700;line-height:1.2}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}

:root{
  --primary:#08A5E3; --primary-dark:#0789BF; --primary-light:#E8F6FD;
  --navy:#0F2A33;
  --orange:#F58220; --orange-dark:#E07318;
  --green:#27AE60;
  --gray-100:#F2F3F5; --gray-200:#E5E7EB; --gray-300:#D1D5DB; --gray-500:#6B7280; --gray-600:#4B5563;
  --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --ease:.22s cubic-bezier(.4,0,.2,1);
}

.site-header{background:#fff;padding:14px 40px;box-shadow:0 1px 0 rgba(15,42,51,.06);display:flex;align-items:center;gap:14px}
.site-header .logo{height:32px}
.site-header .manage-app-link{margin-left:auto;font-size:13px;color:var(--navy);font-weight:600;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;transition:.18s;cursor:pointer}
.site-header .manage-app-link:hover{background:#F2F3F5;color:var(--primary-dark)}
.site-header .manage-app-link i{width:14px;height:14px}
@media(max-width:720px){ .site-header{padding:12px 18px} .site-header .manage-app-link{font-size:12.5px;padding:7px 10px} .site-header .manage-app-link span{display:none} }

/* Welcome-back banner — shown once after returning from signin (?welcome=1). */
.welcome-banner{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:99px;font-size:13.5px;font-weight:500;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 30px rgba(15,42,51,.22);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease}
.welcome-banner.on{opacity:1;transform:translateX(-50%) translateY(0)}
.welcome-banner i{width:16px;height:16px;color:#4AC8F3}
@media(max-width:600px){ .welcome-banner{top:62px;font-size:12.5px;padding:9px 14px} }

.shell{max-width:720px;margin:32px auto 60px;padding:0 18px}
@media(max-width:520px){ .shell{margin-top:18px} }

.card{background:#fff;border-radius:var(--radius-lg);padding:36px 32px;box-shadow:var(--shadow-sm);text-align:center;border:1px solid #EEF1F5}
@media(max-width:520px){ .card{padding:26px 20px;border-radius:12px} }

.success-ring{width:84px;height:84px;border-radius:50%;background:#E7F6EE;color:var(--green);display:inline-flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative;animation:wkPop .42s cubic-bezier(.34,1.56,.64,1) both}
.success-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(39,174,96,.18);animation:wkRingPulse 1.6s ease-out infinite}
.success-ring i{width:40px;height:40px}
.success-ring.visa{background:linear-gradient(135deg,#E8F6FD 0%,#D4EDFB 100%);color:var(--primary-dark)}
.success-ring.visa::before{border-color:rgba(8,165,227,.22)}
@keyframes wkPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes wkRingPulse{0%{transform:scale(.95);opacity:.55}100%{transform:scale(1.25);opacity:0}}

/* Embassy submission timeline (visa submitted state) */
.embassy-timeline{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:22px 22px 18px;margin-bottom:18px;text-align:left}
.embassy-timeline .et-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.embassy-timeline .et-head h3{font-size:13px;color:var(--navy);font-weight:700;display:flex;align-items:center;gap:6px}
.embassy-timeline .et-head h3 i{width:14px;height:14px;color:var(--primary)}
.embassy-timeline .et-status{display:inline-flex;align-items:center;gap:5px;background:#FFF4E6;color:#B45309;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.embassy-timeline .et-status .dot{width:7px;height:7px;border-radius:50%;background:#F58220;animation:wkBlink 1.2s ease-in-out infinite}
@keyframes wkBlink{50%{opacity:.4}}
.et-track{position:relative;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.et-track::before{content:'';position:absolute;top:13px;left:13px;right:13px;height:2px;background:var(--gray-200);z-index:0}
.et-track::after{content:'';position:absolute;top:13px;left:13px;width:calc((100% - 26px) * 0.33);height:2px;background:linear-gradient(90deg,var(--green) 0%,var(--primary) 100%);z-index:1}
.et-step{position:relative;z-index:2;flex:1;min-width:0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px}
.et-step .et-dot{width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid var(--gray-200);color:var(--gray-500);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.et-step .et-dot i{width:12px;height:12px}
.et-step.done .et-dot{background:var(--green);border-color:var(--green);color:#fff}
.et-step.active .et-dot{background:#fff;border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px rgba(8,165,227,.18)}
.et-step .et-lbl{font-size:11px;color:var(--gray-500);font-weight:600;line-height:1.3}
.et-step.done .et-lbl,.et-step.active .et-lbl{color:var(--navy)}
.et-step .et-sub{font-size:10px;color:var(--gray-500);margin-top:1px;font-weight:500}
@media(max-width:520px){
  .et-step .et-lbl{font-size:10px}
  .et-step .et-sub{display:none}
}

/* Visa application reference card — orange variant */
.ref-card.visa-ref{background:linear-gradient(135deg,#1A2939 0%,#0F2A33 100%)}
.ref-card.visa-ref::before{background:rgba(245,130,32,.18)}
.ref-card.visa-ref .ref{color:#FFD7B0}

/* Submission summary grid */
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sub-grid .sg-cell{background:var(--gray-100);border-radius:10px;padding:12px 14px;text-align:left}
.sub-grid .sg-cell .sg-l{font-size:10.5px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.sub-grid .sg-cell .sg-l i{width:11px;height:11px;color:var(--primary)}
.sub-grid .sg-cell .sg-v{font-size:13.5px;color:var(--navy);font-weight:700;line-height:1.3}
@media(max-width:480px){ .sub-grid{grid-template-columns:1fr} }

/* Notify list (what happens next, in visa flow) */
.notify-list{list-style:none;padding:0;margin:6px 0 0;display:grid;gap:6px}
.notify-list li{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--gray-600);line-height:1.45}
.notify-list li i{width:13px;height:13px;color:var(--green);flex-shrink:0;margin-top:2px}

/* Payment-confirmed status grid (post-payment, with_visa flow) */
.pay-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.pay-status-grid .ps-cell{background:#fff;border:1px solid var(--gray-200);border-radius:11px;padding:14px 16px;text-align:left}
.pay-status-grid .ps-l{font-size:10.5px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pay-status-grid .ps-l i{width:11px;height:11px;color:var(--primary)}
.pay-status-grid .ps-v{font-size:14px;color:var(--navy);font-weight:700;line-height:1.3;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pay-status-grid .ps-amount{color:var(--orange);font-size:18px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.pay-status-grid .ps-date{font-size:13px;color:var(--navy);font-weight:600;line-height:1.35}
.pay-status-grid .ps-date small{display:block;font-size:11px;color:var(--gray-500);font-weight:500;margin-top:2px}

.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.01em}
.status-badge i{width:12px;height:12px}
.status-badge.success{background:#E7F6EE;color:#1F6E3D}
.status-badge.pending{background:#FFF4E6;color:#B45309}
.status-badge.pending .dot{width:7px;height:7px;border-radius:50%;background:#F58220;animation:wkBlink 1.2s ease-in-out infinite}
.status-badge.review{background:#FEF2F2;color:#B91C1C}
.status-badge.review i{color:#DC2626}
@media(max-width:480px){
  .pay-status-grid{grid-template-columns:1fr}
  .pay-status-grid .ps-amount{font-size:17px}
}

/* Helper line below the primary CTA */
.cta-helper{font-size:12.5px;color:var(--gray-600);text-align:center;margin-top:14px;line-height:1.55;padding:0 8px}
.cta-helper i{width:13px;height:13px;color:var(--primary);vertical-align:-2px;margin-right:4px}
.cta-helper strong{color:var(--navy);font-weight:600}

/* Print-friendly */
@media print{
  body{background:#fff}
  .site-header,.actions,.secondary-actions,.cta-helper{display:none !important}
  .card{box-shadow:none;border:none}
  .ref-card{background:#fff !important;color:var(--navy) !important;border:1.5px solid var(--gray-200)}
  .ref-card .ref{color:var(--navy) !important}
  .ref-card::before{display:none}
}

.card h1{font-size:24px;color:var(--navy);margin-bottom:8px;letter-spacing:-.01em}
@media(max-width:520px){ .card h1{font-size:20px} }
.card .lede{font-size:13.5px;color:var(--gray-600);margin-bottom:8px;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.55}

.email-note{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500);background:var(--gray-100);padding:7px 14px;border-radius:999px;margin-bottom:22px;font-weight:500}
.email-note i{width:13px;height:13px;color:var(--primary)}
.email-note strong{color:var(--navy);font-weight:600}

/* Reference card — prominent & copyable */
.ref-card{background:linear-gradient(135deg,#0E2D5C 0%,#143869 100%);color:#fff;border-radius:12px;padding:20px 22px;margin-bottom:18px;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:relative;overflow:hidden}
.ref-card::before{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(8,165,227,.15);pointer-events:none}
.ref-card .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.65);font-weight:600;margin-bottom:4px}
.ref-card .ref{font-size:22px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:-.01em;font-family:'DM Mono','Menlo',monospace}
.ref-card .copy-btn{position:relative;z-index:1;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22);padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:var(--ease)}
.ref-card .copy-btn:hover{background:rgba(255,255,255,.22)}
.ref-card .copy-btn i{width:13px;height:13px}
.ref-card .copy-btn.ok{background:rgba(39,174,96,.5);border-color:transparent}
@media(max-width:520px){ .ref-card{padding:16px 18px} .ref-card .ref{font-size:18px} }

/* Receipt block */
.receipt{background:var(--gray-100);border-radius:12px;padding:18px 22px;text-align:left;margin-bottom:18px}
.receipt h3{font-size:12px;color:var(--gray-500);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.receipt h3 i{width:13px;height:13px;color:var(--primary)}
.r-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:13px;color:var(--gray-600);padding:7px 0;gap:14px}
.r-row .l{flex-shrink:0}
.r-row .v{color:var(--navy);font-weight:600;text-align:right;line-height:1.4}
.r-row .v.pill{display:inline-flex;align-items:center;gap:4px;background:#E7F6EE;color:#1F6E3D;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600}
.r-row .v.pill i{width:11px;height:11px}
.r-row.pax-row .v{font-weight:500;font-size:12.5px;color:var(--gray-600)}
.r-total{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:8px;border-top:1.5px solid var(--gray-200);align-items:center}
.r-total .l{font-size:13px;color:var(--navy);font-weight:700}
.r-total .v{color:var(--orange);font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em}

/* Next-step CTA box (visa flow only) */
.next-box{text-align:left;background:linear-gradient(135deg,#E8F6FD 0%,#F4FAFE 100%);border:1px solid #B8DDF0;border-radius:12px;padding:18px 22px;margin-bottom:18px;display:flex;gap:14px;align-items:flex-start}
.next-box .ico{width:38px;height:38px;border-radius:10px;background:var(--primary);color:#fff;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.next-box .ico i{width:18px;height:18px}
.next-box h4{font-size:14px;color:var(--navy);margin-bottom:4px;font-weight:700}
.next-box p{font-size:12.5px;color:var(--gray-600);margin:0;line-height:1.55}
@media(max-width:480px){ .next-box{padding:14px 16px;gap:10px} .next-box .ico{width:32px;height:32px} }

/* Actions */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btn{padding:13px 22px;border-radius:11px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:var(--ease);cursor:pointer;border:none;min-height:46px}
.btn i{width:14px;height:14px}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 6px 14px rgba(245,130,32,.28)}
.btn-primary:hover{background:var(--orange-dark);box-shadow:0 8px 18px rgba(245,130,32,.36)}
.btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--gray-200)}
.btn-ghost:hover{border-color:var(--gray-300);background:var(--gray-100)}
@media(max-width:520px){
  .actions{flex-direction:column-reverse;gap:8px}
  .actions .btn{width:100%}
}

.secondary-actions{display:flex;justify-content:center;gap:18px;margin-top:18px;flex-wrap:wrap}
.secondary-actions a{font-size:12px;color:var(--gray-500);font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:var(--ease)}
.secondary-actions a:hover{color:var(--primary)}
.secondary-actions i{width:13px;height:13px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:8px;font-size:12.5px;box-shadow:0 10px 28px rgba(0,0,0,.18);transition:transform .3s ease;z-index:200}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
<link rel="stylesheet" href="umrah-theme.css">
</head>
<body>

<header class="site-header">
  <a href="saudi-packages.html"><img src="wakanow-logo.svg" alt="Wakanow" class="logo"></a>
  <a href="umrah-signin.html" class="manage-app-link" title="Continue an existing visa application">
    <i data-lucide="user-check"></i><span>Manage Application</span>
  </a>
</header>

<div class="shell">
  <div class="card" id="card"></div>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

<script src="umrah-portal-data.js"></script>
<script src="umrah-contact.js" defer></script>
<script>
lucide.createIcons();

const params = new URLSearchParams(location.search);
const bookingId = params.get('bookingId');
const submitted = params.get('submitted') === '1';
const b = UmrahPortal.findBooking(bookingId);
const card = document.getElementById('card');

// Welcome-back banner — only when arriving from signin (?welcome=1).
maybeShowWelcomeBack(b);
function maybeShowWelcomeBack(booking){
  if (params.get('welcome') !== '1' || !booking) return;
  const lead = (booking.passengers && booking.passengers[0]) || {};
  const firstName = (lead.firstName || '').trim();
  const greeting = firstName ? ('Welcome back, ' + firstName) : 'Welcome back';
  const el = document.createElement('div');
  el.className = 'welcome-banner';
  el.innerHTML = '<i data-lucide="hand"></i><span>' + greeting + '</span>';
  document.body.appendChild(el);
  lucide.createIcons();
  requestAnimationFrame(() => el.classList.add('on'));
  setTimeout(() => { el.classList.remove('on'); setTimeout(() => el.remove(), 280); }, 3000);
  params.delete('welcome');
  const qs = params.toString();
  history.replaceState({}, '', location.pathname + (qs ? '?' + qs : ''));
}

if (!b){
  card.innerHTML = `
    <div class="success-ring" style="background:#FEE2E2;color:#DC2626"><i data-lucide="alert-circle"></i></div>
    <h1>Booking not found</h1>
    <p class="lede">We could not find this booking reference. It may have expired or been removed.</p>
    <div class="actions">
      <a class="btn btn-primary" href="saudi-packages.html"><i data-lucide="home"></i> Back to home</a>
    </div>
  `;
  lucide.createIcons();
} else {
  const isVisaSubmitted = submitted || (b.visa && b.visa.submissionStatus === 'submitted');
  const isPkgOnly = b.type === 'without_visa';
  const contactEmail = (b.contact && b.contact.email) || (UmrahPortal.load().user && UmrahPortal.load().user.email) || '';
  const passengerNames = Array.isArray(b.passengers) && b.passengers.length
    ? b.passengers.map(p => `${p.firstName || ''} ${p.lastName || ''}`.trim()).filter(Boolean)
    : [];

  // ─── Visa-submitted state — dedicated confirmation layout ───
  if (isVisaSubmitted) {
    const submittedAt = (b.visa && b.visa.submittedAt) ? new Date(b.visa.submittedAt) : new Date();
    const submittedFmt = submittedAt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
      + ' · ' + submittedAt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    // Application reference = the booking ID itself (no prefix enforcement)
    const appRef = b.id || '';
    const numApplicants = (b.visa && Array.isArray(b.visa.applicants)) ? b.visa.applicants.length : (b.quantity || 1);

    card.innerHTML = `
      <div class="success-ring visa"><i data-lucide="send"></i></div>
      <h1>Visa application submitted</h1>
      <p class="lede">Your file has been packaged and transmitted to the Saudi Embassy in Abuja. Sit tight — we'll notify you the moment there's an update.</p>

      ${contactEmail ? `<div class="email-note"><i data-lucide="mail"></i> Updates will be sent to <strong>${escapeHtml(contactEmail)}</strong></div>` : ''}

      <div class="ref-card visa-ref">
        <div>
          <div class="l">Visa application reference</div>
          <div class="ref" id="refValue">${appRef}</div>
        </div>
        <button class="copy-btn" id="copyRefBtn" type="button" aria-label="Copy application reference">
          <i data-lucide="copy"></i> <span>Copy</span>
        </button>
      </div>

      <div class="sub-grid">
        <div class="sg-cell">
          <div class="sg-l"><i data-lucide="hash"></i> Booking</div>
          <div class="sg-v">${b.id}</div>
        </div>
        <div class="sg-cell">
          <div class="sg-l"><i data-lucide="users"></i> Applicants</div>
          <div class="sg-v">${numApplicants} ${numApplicants > 1 ? 'travellers' : 'traveller'}</div>
        </div>
        <div class="sg-cell">
          <div class="sg-l"><i data-lucide="calendar-check"></i> Submitted on</div>
          <div class="sg-v">${submittedFmt}</div>
        </div>
        <div class="sg-cell">
          <div class="sg-l"><i data-lucide="map-pin"></i> Processing at</div>
          <div class="sg-v">Saudi Embassy, Abuja</div>
        </div>
      </div>

      <div class="embassy-timeline">
        <div class="et-head">
          <h3><i data-lucide="route"></i> Application progress</h3>
          <span class="et-status"><span class="dot"></span> Embassy review</span>
        </div>
        <div class="et-track">
          <div class="et-step done">
            <span class="et-dot"><i data-lucide="check"></i></span>
            <span class="et-lbl">Submitted</span>
            <span class="et-sub">Today</span>
          </div>
          <div class="et-step active">
            <span class="et-dot">2</span>
            <span class="et-lbl">Embassy review</span>
            <span class="et-sub">5–10 days</span>
          </div>
          <div class="et-step">
            <span class="et-dot">3</span>
            <span class="et-lbl">Decision</span>
            <span class="et-sub">via email</span>
          </div>
          <div class="et-step">
            <span class="et-dot">4</span>
            <span class="et-lbl">Visa ready</span>
            <span class="et-sub">to download</span>
          </div>
        </div>
      </div>

      <div class="next-box">
        <div class="ico" style="background:var(--green)"><i data-lucide="bell"></i></div>
        <div>
          <h4>What happens next</h4>
          <ul class="notify-list">
            <li><i data-lucide="check-circle"></i> Embassy will process your application within <strong>5–10 business days</strong>.</li>
            <li><i data-lucide="check-circle"></i> You'll get an <strong>email + SMS</strong> the moment a decision is made.</li>
            <li><i data-lucide="check-circle"></i> Approved visas can be downloaded by signing in with your <strong>Booking ID</strong>.</li>
            <li><i data-lucide="check-circle"></i> No further action needed — you can close this page safely.</li>
          </ul>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="location.href='saudi-packages.html'">
          <i data-lucide="home"></i> Back to home
        </button>
      </div>

      <div class="secondary-actions">
        <a onclick="window.print()"><i data-lucide="printer"></i> Print submission receipt</a>
        <a href="mailto:umrah@wakanow.com"><i data-lucide="message-circle"></i> Contact support</a>
      </div>
    `;
    lucide.createIcons();
    wireCopy();
  } else {

  // ─── Visa+Package — Payment confirmed (dedicated layout per spec) ───
  // Shows: Booking ID (copyable), Payment Status (Successful), Application
  // Status (Pending), Payment Date, Amount Paid. CTA "Continue to Visa
  // Application" routes straight into the wizard — no auth, since the user is
  // in an active session via setSessionAuth() set during confirmPay().
  // Helper line tells them they can return later via Manage Application.
  if (!isPkgOnly) {
    const paidAt = b.paidAt ? new Date(b.paidAt) : (b.createdAt ? new Date(b.createdAt) : new Date());
    const paidDateFmt = paidAt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    const paidTimeFmt = paidAt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    // ─── Application Status (reflects pre-qualification + visa state) ───
    const appStatusLabel = UmrahPortal.applicationStatusLabel(b);
    let appStatusCls = 'pending', appStatusDot = '<span class="dot"></span>';
    if (appStatusLabel === 'Submitted') { appStatusCls = 'success'; appStatusDot = '<i data-lucide="check-circle"></i>'; }
    else if (appStatusLabel === 'Under Review') { appStatusCls = 'review'; appStatusDot = '<i data-lucide="alert-triangle"></i>'; }
    // CTA label depends on where the user is in the journey
    const pq = b.preQualification;
    let visaCtaLabel = 'Continue to Visa Application';
    if (pq && pq.status === 'failed') visaCtaLabel = 'View Support Information';
    else if (pq && pq.status === 'passed') visaCtaLabel = 'Resume Visa Application';
    else if (pq && pq.status === 'in_progress' && pq.passengers && pq.passengers.some(p => p.step !== 'pending' && p.step !== 'eligible')) {
      visaCtaLabel = 'Resume Pre-Qualification';
    }

    card.innerHTML = `
      <div class="success-ring"><i data-lucide="check"></i></div>
      <h1>Payment confirmed</h1>
      <p class="lede">Your booking is secured. Now let's complete the visa application so we can submit your file to the Saudi Embassy.</p>

      ${contactEmail ? `<div class="email-note"><i data-lucide="mail"></i> Confirmation sent to <strong>${escapeHtml(contactEmail)}</strong></div>` : ''}

      <div class="ref-card">
        <div>
          <div class="l">Booking ID</div>
          <div class="ref" id="refValue">${b.id}</div>
        </div>
        <button class="copy-btn" id="copyRefBtn" type="button" aria-label="Copy booking ID">
          <i data-lucide="copy"></i> <span>Copy</span>
        </button>
      </div>

      <div class="pay-status-grid">
        <div class="ps-cell">
          <div class="ps-l"><i data-lucide="shield-check"></i> Payment status</div>
          <div class="ps-v"><span class="status-badge success"><i data-lucide="check-circle"></i> Successful</span></div>
        </div>
        <div class="ps-cell">
          <div class="ps-l"><i data-lucide="file-text"></i> Application status</div>
          <div class="ps-v"><span class="status-badge ${appStatusCls}">${appStatusDot} ${appStatusLabel}</span></div>
        </div>
        <div class="ps-cell">
          <div class="ps-l"><i data-lucide="calendar"></i> Payment date</div>
          <div class="ps-date">${paidDateFmt} <small>${paidTimeFmt}</small></div>
        </div>
        <div class="ps-cell">
          <div class="ps-l"><i data-lucide="wallet"></i> Amount paid</div>
          <div class="ps-v ps-amount">${UmrahPortal.ngn(b.totalPrice || 0)}</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="continueToVisa('${b.id}')">
          ${visaCtaLabel} <i data-lucide="arrow-right"></i>
        </button>
      </div>

      <p class="cta-helper">
        <i data-lucide="info"></i> Not ready now? You can continue anytime from <strong>Manage Application</strong> using your Booking ID.
      </p>

      <div class="secondary-actions">
        <a onclick="window.print()"><i data-lucide="printer"></i> Print receipt</a>
        <a href="mailto:umrah@wakanow.com"><i data-lucide="message-circle"></i> Contact support</a>
      </div>
    `;
    lucide.createIcons();
    wireCopy();
  } else {

  // ─── Package-only — Booking confirmed (no visa, flow ends here) ───
  // Per spec: NO Application Status, NO "Continue to Visa Application" CTA,
  // NO Manage Application hint. Just the receipt and a way home.
  const passengersBlock = passengerNames.length
    ? `<div class="r-row pax-row"><span class="l">Travellers</span><span class="v">${passengerNames.map(n => escapeHtml(n)).join('<br>')}</span></div>`
    : `<div class="r-row"><span class="l">Travellers</span><span class="v">${b.quantity}</span></div>`;

  const paidAt = b.paidAt ? new Date(b.paidAt) : (b.createdAt ? new Date(b.createdAt) : new Date());
  const paidDateFmt = paidAt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  const paidTimeFmt = paidAt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

  card.innerHTML = `
    <div class="success-ring"><i data-lucide="check"></i></div>
    <h1>Booking confirmed</h1>
    <p class="lede">Your Umrah package is locked in. We've emailed your e-tickets, itinerary, and accommodation vouchers.</p>

    ${contactEmail ? `<div class="email-note"><i data-lucide="mail"></i> Confirmation sent to <strong>${escapeHtml(contactEmail)}</strong></div>` : ''}

    <div class="ref-card">
      <div>
        <div class="l">Booking ID</div>
        <div class="ref" id="refValue">${b.id}</div>
      </div>
      <button class="copy-btn" id="copyRefBtn" type="button" aria-label="Copy booking ID">
        <i data-lucide="copy"></i> <span>Copy</span>
      </button>
    </div>

    <div class="pay-status-grid">
      <div class="ps-cell">
        <div class="ps-l"><i data-lucide="shield-check"></i> Payment status</div>
        <div class="ps-v"><span class="status-badge success"><i data-lucide="check-circle"></i> Successful</span></div>
      </div>
      <div class="ps-cell">
        <div class="ps-l"><i data-lucide="calendar"></i> Payment date</div>
        <div class="ps-date">${paidDateFmt} <small>${paidTimeFmt}</small></div>
      </div>
      <div class="ps-cell">
        <div class="ps-l"><i data-lucide="wallet"></i> Amount paid</div>
        <div class="ps-v ps-amount">${UmrahPortal.ngn(b.totalPrice || 0)}</div>
      </div>
      <div class="ps-cell">
        <div class="ps-l"><i data-lucide="users"></i> Travellers</div>
        <div class="ps-date">${b.quantity}<small>${passengerNames.length ? passengerNames.map(n => escapeHtml(n)).join(', ') : 'traveller(s)'}</small></div>
      </div>
    </div>

    <div class="next-box">
      <div class="ico"><i data-lucide="luggage"></i></div>
      <div>
        <h4>What happens next</h4>
        <p>You'll receive your full travel document pack 14 days before departure. Make sure your passport is valid for at least 6 months from your travel date.</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="button" onclick="location.href='saudi-packages.html'">
        <i data-lucide="home"></i> Back to home
      </button>
    </div>

    <div class="secondary-actions">
      <a onclick="window.print()"><i data-lucide="printer"></i> Print receipt</a>
      <a href="mailto:umrah@wakanow.com"><i data-lucide="message-circle"></i> Contact support</a>
    </div>
  `;
  lucide.createIcons();
  wireCopy();
  }
  }
}

function wireCopy(){
  const btn = document.getElementById('copyRefBtn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const v = document.getElementById('refValue').textContent.trim();
    const done = () => {
      btn.classList.add('ok');
      btn.querySelector('span').textContent = 'Copied!';
      showToast('Booking reference copied');
      setTimeout(() => {
        btn.classList.remove('ok');
        btn.querySelector('span').textContent = 'Copy';
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(v).then(done).catch(fallbackCopy);
    } else fallbackCopy();
    function fallbackCopy(){
      const ta = document.createElement('textarea');
      ta.value = v; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch(e){}
      document.body.removeChild(ta);
    }
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 1800);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

// ─── Continue to Visa Application — routes through pre-qualification ─────
// Per spec: "Continue to Visa Application" goes to the pre-qualification
// page first. The pre-qual page reads the booking, classifies each pax by
// nationality (already captured at PAX form), and routes to the right tier.
function continueToVisa(id){
  const fresh = UmrahPortal.findBooking(id);
  if (!fresh) return;
  const pq = fresh.preQualification;
  // Failed pre-qual → support page (reachable via the qualify page)
  if (pq && pq.status === 'failed') {
    location.href = 'umrah-qualify.html?bookingId=' + encodeURIComponent(id);
    return;
  }
  // Already passed pre-qual → straight into the wizard
  if (pq && pq.status === 'passed') {
    UmrahPortal.setSessionAuth(id);
    location.href = 'umrah-visa-wizard.html?bookingId=' + encodeURIComponent(id);
    return;
  }
  // Default: enter pre-qualification (creates state on first hit)
  location.href = 'umrah-qualify.html?bookingId=' + encodeURIComponent(id);
}
</script>
