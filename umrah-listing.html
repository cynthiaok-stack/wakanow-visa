<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Umrah Packages — Wakanow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',system-ui,sans-serif;font-size:16px;color:#1E3138;line-height:1.55;background:#F5F7FA;min-height:100vh}
h1,h2,h3,h4{font-family:'Rubik',system-ui,sans-serif;font-weight:700;line-height:1.2}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

:root{
  --primary:#08A5E3; --primary-dark:#0789BF; --primary-light:#E8F6FD;
  --navy:#0F2A33; --navy-deep:#0B3A52;
  --orange:#F58220; --orange-dark:#E07318;
  --green:#27AE60;
  --gray-50:#F9FAFB; --gray-100:#F2F3F5; --gray-200:#E5E7EB; --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563;
  --radius:10px; --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
  --ease:.22s cubic-bezier(.4,0,.2,1);
}

.site-header{background:#fff;padding:14px 40px;display:flex;align-items:center;gap:20px;box-shadow:0 1px 0 rgba(15,42,51,.06);position:relative;z-index:10}
.site-header .logo{height:32px}
.nav-links{display:flex;align-items:center;gap:28px;margin-left:40px}
.nav-links a{font-size:14px;color:var(--navy);font-weight:500;transition:var(--ease)}
.nav-links a:hover{color:var(--primary)}
.nav-links a.active{color:var(--primary);font-weight:600}
.header-right{display:flex;align-items:center;gap:18px;margin-left:auto}
.btn-manage{background:var(--orange);color:#fff;font-weight:600;font-size:13px;padding:10px 20px;border-radius:8px;display:inline-flex;align-items:center;gap:8px;transition:var(--ease)}
.btn-manage:hover{background:var(--orange-dark)}
.btn-manage i{width:15px;height:15px}
.sign-in{font-size:14px;color:var(--navy);font-weight:600;display:inline-flex;align-items:center;gap:6px}
.sign-in i{width:15px;height:15px}
.country-pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--navy);font-weight:500;padding:8px 4px}
.country-pill .flag{width:16px;height:16px;border-radius:50%;background:var(--green);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}
.country-pill i{width:14px;height:14px;color:var(--gray-500)}
@media(max-width:720px){ .nav-links{display:none} .site-header{padding:12px 20px} }

/* Page */
.page-head{background:linear-gradient(135deg,var(--navy-deep),var(--navy));color:#fff;padding:44px 40px 28px}
.page-head-inner{max-width:1200px;margin:0 auto}
.crumbs{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:10px;display:flex;gap:6px;align-items:center}
.crumbs a{color:rgba(255,255,255,.9)}
.crumbs i{width:12px;height:12px}
.page-head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
.page-head h1{font-size:30px;font-weight:700;margin-bottom:6px}
.page-head p{font-size:14px;color:rgba(255,255,255,.8);max-width:640px}
@media(max-width:720px){ .page-head{padding:30px 20px 22px} .page-head h1{font-size:24px} }

.btn-byo-top{display:inline-flex;align-items:center;gap:10px;background:var(--orange);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;transition:var(--ease);white-space:nowrap}
.btn-byo-top:hover{background:var(--orange-dark);box-shadow:0 10px 28px rgba(245,130,32,.35);transform:translateY(-1px)}
.btn-byo-top i{width:15px;height:15px}
.btn-byo-top .ext{opacity:.75;width:13px;height:13px}

.shell{max-width:1200px;margin:0 auto;padding:28px 40px 60px}
@media(max-width:720px){ .shell{padding:24px 20px 40px} }

/* Toolbar (filter + sort) */
.list-toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px;padding:12px 0;border-top:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200)}
.toolbar-left{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap}
.toolbar-label{font-size:12px;color:var(--gray-500);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.toolbar-label i{width:14px;height:14px}

.chip-row{display:inline-flex;gap:6px;background:var(--gray-100);padding:4px;border-radius:999px}
.chip{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--gray-600);transition:var(--ease);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;background:none;border:none;cursor:pointer;font-family:inherit}
.chip i{width:14px;height:14px}
.chip:hover{color:var(--navy)}
.chip.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(15,42,51,.1)}
.chip .n{font-size:10px;font-weight:700;color:var(--gray-500);padding:1px 6px;border-radius:999px;background:var(--gray-200)}
.chip.on .n{background:var(--primary-light);color:var(--primary)}

.toolbar-right{display:inline-flex;align-items:center;gap:12px}
.count-label{font-size:13px;color:var(--gray-600)}
.count-label strong{color:var(--navy)}
.sort-select{background:#fff;border:1px solid var(--gray-200);padding:9px 14px;border-radius:8px;font-size:13px;color:var(--navy);font-family:inherit;font-weight:500;cursor:pointer}

/* ── Row-based layout ──
   Desktop / tablet: each .pkg-row-track is a responsive grid (2 cols tablet,
   3 cols desktop) — adjacent rows visually merge into one continuous grid.
   Mobile (<640px): each row becomes a horizontal scroller of up to 6 cards
   with snap behaviour, momentum scrolling, and a dot indicator below. */
.pkg-rows{display:flex;flex-direction:column;gap:24px}
.pkg-row{display:block}
.pkg-row-label{font-size:12.5px;font-weight:600;color:var(--gray-500);margin:0 0 10px;letter-spacing:.04em;text-transform:uppercase;display:none}
.pkg-row-track{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:640px){ .pkg-row-track{grid-template-columns:repeat(2,1fr);gap:18px} }
@media(min-width:1100px){ .pkg-row-track{grid-template-columns:repeat(3,1fr)} }
.pkg-row-dots{display:none}

@media(max-width:639px){
  .pkg-rows{gap:18px}
  /* Show row label only when there's more than one row (toggled via JS) */
  .pkg-rows.multi-row .pkg-row-label{display:block}
  .pkg-row-track{
    display:flex;
    grid-template-columns:none;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    gap:12px;
    margin:0 -20px;
    padding:4px 20px 6px;
    scrollbar-width:none;
  }
  .pkg-row-track::-webkit-scrollbar{display:none;height:0;width:0}
  .pkg-row-track .pkg-card{flex:0 0 82%;scroll-snap-align:start;min-width:0}
  .pkg-row-dots{display:flex;justify-content:center;gap:6px;margin-top:8px}
  .pkg-row-dots .dot{width:6px;height:6px;border-radius:50%;background:var(--gray-300);transition:var(--ease);flex-shrink:0}
  .pkg-row-dots .dot.active{background:var(--primary);width:18px;border-radius:99px}
}

.pkg-card{background:#fff;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:var(--ease);display:flex;flex-direction:column;cursor:pointer}
.pkg-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.pkg-card:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

.pkg-image{aspect-ratio:16/10;background-size:cover;background-position:center;position:relative}

.pkg-tag{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.96);color:var(--navy);font-size:11px;font-weight:700;padding:6px 12px;border-radius:999px;box-shadow:var(--shadow-sm);letter-spacing:.02em;text-transform:uppercase}
.pkg-tag.with_visa{color:#0F7A3E;background:#E7F6EE}
.pkg-tag.without_visa{color:#0789BF;background:#E8F6FD}

.pkg-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.pkg-name{font-size:15px;font-weight:700;color:var(--navy);line-height:1.3;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pkg-dates{font-size:12.5px;color:var(--gray-600);min-height:18px;line-height:1.4}

.pkg-inclusions{font-size:12px;color:var(--gray-600);line-height:1.7;min-height:36px;display:flex;flex-wrap:wrap;gap:4px 14px;align-content:flex-start}
.inc-dot{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.inc-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;display:inline-block}

.pkg-avail{font-size:11.5px;color:var(--gray-500);font-weight:500;margin-top:-2px;letter-spacing:.01em}
.pkg-avail.low{color:#B45309;font-weight:600}
.pkg-avail.sold{color:#DC2626;font-weight:600}

.pkg-foot{margin-top:auto;padding-top:14px;border-top:1px solid #EEF1F5;display:flex;flex-direction:column;gap:10px;align-items:stretch}
@media(min-width:560px){
  .pkg-foot{flex-direction:row;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
}
.pkg-price{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.pkg-price .from{font-size:10px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.pkg-price .amt{font-size:17px;color:var(--navy);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em;margin-top:2px}
.pkg-price .per{font-size:11px;color:var(--gray-500);margin-left:3px;font-weight:500}

.btn-select{background:var(--orange);color:#fff;font-weight:600;font-size:13px;padding:10px 14px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:var(--ease);border:none;cursor:pointer;width:100%;min-height:40px;flex-shrink:0}
@media(min-width:560px){
  .btn-select{width:auto;padding:9px 14px;font-size:12.5px}
}
.btn-select:hover{background:var(--orange-dark)}
.btn-select i{width:13px;height:13px}

.empty{background:#fff;border-radius:var(--radius-lg);padding:60px 20px;text-align:center;color:var(--gray-500)}
.empty i{width:42px;height:42px;color:var(--gray-300);margin-bottom:12px;display:inline-block}
</style>
<link rel="stylesheet" href="umrah-theme.css">
</head>
<body>

<header class="site-header">
  <a href="saudi-packages.html"><img src="wakanow-logo.svg" alt="Wakanow" class="logo"></a>
  <nav class="nav-links">
    <a href="saudi-packages.html">Home</a>
    <a href="umrah-listing.html" class="active">Packages</a>
    <a href="#esim">eSIM</a>
    <a href="#trains">Trains</a>
  </nav>
  <div class="header-right">
    <button class="btn-manage" onclick="location.href='umrah-signin.html'"><i data-lucide="ticket"></i> Manage Application</button>
    <button class="sign-in"><i data-lucide="user-round"></i> <span id="authLabel">Sign In</span></button>
    <div class="country-pill"><span class="flag">NG</span><span id="currencyLabel">NG | NGN</span><i data-lucide="chevron-down"></i></div>
  </div>
</header>

<section class="page-head">
  <div class="page-head-inner">
    <div class="crumbs">
      <a href="saudi-packages.html">Home</a>
      <i data-lucide="chevron-right"></i>
      <span>Packages</span>
    </div>
    <div class="page-head-row">
      <div>
        <h1>All Umrah Packages</h1>
        <p>Compare full packages with visa, flight-only bundles and travel-only options. Every package is curated, vetted and supported end-to-end by Wakanow.</p>
      </div>
      <a class="btn-byo-top" href="https://wakanow.com/packages" target="_blank" rel="noopener" onclick="return confirmByo()">
        <i data-lucide="wrench"></i> Build Your Own Package
        <i data-lucide="external-link" class="ext"></i>
      </a>
    </div>
  </div>
</section>

<div class="shell">
  <main>
    <div class="list-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-label"><i data-lucide="sliders-horizontal"></i> Filter:</span>
        <div class="chip-row" role="tablist">
          <button class="chip on" data-filter="all">All <span class="n" id="count-all">0</span></button>
          <button class="chip" data-filter="with_visa">Package + Visa <span class="n" id="count-with_visa">0</span></button>
          <button class="chip" data-filter="without_visa">Package only <span class="n" id="count-without_visa">0</span></button>
        </div>
      </div>
      <div class="toolbar-right">
        <div class="count-label"><strong id="resultCount">0</strong> packages</div>
        <select class="sort-select" id="sortBy">
          <option value="popular">Sort: Most popular</option>
          <option value="price-asc">Price: Low to high</option>
          <option value="price-desc">Price: High to low</option>
        </select>
      </div>
    </div>
    <div class="pkg-rows" id="pkgGrid"></div>
  </main>
</div>

<script src="umrah-portal-data.js"></script>
<script src="umrah-contact.js" defer></script>
<script>
lucide.createIcons();
const state = { filter: new URLSearchParams(location.search).get('type') || 'all', sort: 'popular' };

function filtered(){
  let list = state.filter === 'all' ? [...UmrahPortal.PACKAGES] : UmrahPortal.PACKAGES.filter(p => p.type === state.filter);
  if (state.sort === 'price-asc') list.sort((a,b) => a.price - b.price);
  if (state.sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  return list;
}

function stars(n){
  if (!n) return '';
  return '★'.repeat(n) + '<span style="color:var(--gray-300)">' + '★'.repeat(5-n) + '</span>';
}

/* Map free-text inclusions to canonical text dots */
function inclusionDots(included){
  if (!Array.isArray(included)) return '';
  const seen = new Set();
  const map = [
    { match:/visa|e-?visa|embassy/i, label:'Visa' },
    { match:/flight|airfare|return.*fly|los\s*→|jed/i, label:'Flight' },
    { match:/hotel|lodging|haram[- ]view|makkah|madinah|room/i, label:'Hotel' },
    { match:/transfer|transport|drop[- ]off|pickup|airport/i, label:'Transport' },
    { match:/breakfast|meal|half[- ]board|full[- ]board|dining/i, label:'Meals' },
    { match:/scholar|guide|enrichment|companion/i, label:'Scholar' },
    { match:/ziyarat|tour|taif|excursion/i, label:'Tours' },
    { match:/sim|esim|data|wifi|connectivity/i, label:'eSIM' },
    { match:/zamzam|water/i, label:'Zamzam' },
    { match:/sms|whatsapp|update|status/i, label:'Updates' }
  ];
  const dots = [];
  included.forEach(item => {
    for (const m of map){
      if (m.match.test(item) && !seen.has(m.label)){
        seen.add(m.label);
        dots.push(`<span class="inc-dot">${m.label}</span>`);
        break;
      }
    }
  });
  return dots.slice(0, 5).join('');
}

function renderCounts(){
  const all = UmrahPortal.PACKAGES.length;
  document.getElementById('count-all').textContent = all;
  document.getElementById('count-with_visa').textContent = UmrahPortal.PACKAGES.filter(p => p.type === 'with_visa').length;
  document.getElementById('count-without_visa').textContent = UmrahPortal.PACKAGES.filter(p => p.type === 'without_visa').length;
}

function renderCard(p){
  const dotsInc = inclusionDots(p.included);
  const slots = p.availableSlots || 0;
  const lowAvail = slots > 0 && slots <= 5;
  let availClass = '';
  let availLabel = `Available: ${slots}`;
  if (slots === 0){ availClass = 'sold'; availLabel = 'Sold out'; }
  else if (lowAvail){ availClass = 'low'; availLabel = `Only ${slots} left`; }
  const dateRow = p.dates ? p.dates : 'Flexible departure';
  return `
    <article class="pkg-card" tabindex="0" onclick="location.href='umrah-detail.html?id=${p.id}'" onkeydown="if(event.key==='Enter')location.href='umrah-detail.html?id=${p.id}'">
      <div class="pkg-image" style="background-image:url('${p.image}')">
        <span class="pkg-tag ${p.type}">${p.typeLabel}</span>
      </div>
      <div class="pkg-body">
        <h3 class="pkg-name">${p.name}</h3>
        <div class="pkg-dates">${dateRow}</div>
        <div class="pkg-inclusions">${dotsInc}</div>
        <div class="pkg-avail ${availClass}">${availLabel}</div>
        <div class="pkg-foot">
          <div class="pkg-price">
            <span class="from">From</span>
            <div><span class="amt">${UmrahPortal.ngn(p.price)}</span><span class="per">/pax</span></div>
          </div>
          <button class="btn-select" onclick="event.stopPropagation();location.href='umrah-detail.html?id=${p.id}'">
            View Details <i data-lucide="arrow-right"></i>
          </button>
        </div>
      </div>
    </article>
  `;
}

const ROW_SIZE = 6;

function render(){
  const list = filtered();
  document.getElementById('resultCount').textContent = list.length;
  const grid = document.getElementById('pkgGrid');
  if (!list.length){
    grid.classList.remove('multi-row');
    grid.innerHTML = `<div class="empty"><i data-lucide="search-x"></i><div>No packages match this filter.</div></div>`;
    lucide.createIcons();
    return;
  }
  // Chunk into rows of up to ROW_SIZE so each row fits the mobile horizontal
  // carousel constraint. On desktop the rows visually merge into one grid
  // because each row's track uses the same grid-template-columns.
  const rows = [];
  for (let i = 0; i < list.length; i += ROW_SIZE) rows.push(list.slice(i, i + ROW_SIZE));
  grid.classList.toggle('multi-row', rows.length > 1);
  grid.innerHTML = rows.map((row, rowIdx) => {
    const startNum = rowIdx * ROW_SIZE + 1;
    const endNum   = startNum + row.length - 1;
    const labelText = `Showing ${startNum}–${endNum} of ${list.length}`;
    const cards = row.map(renderCard).join('');
    const dots = row.map((_, i) => `<span class="dot${i === 0 ? ' active' : ''}"></span>`).join('');
    return `
      <section class="pkg-row" data-row="${rowIdx}">
        <div class="pkg-row-label">${labelText}</div>
        <div class="pkg-row-track">${cards}</div>
        <div class="pkg-row-dots">${dots}</div>
      </section>
    `;
  }).join('');
  lucide.createIcons();
  setupRowScrolls();
}

// Wire each row's horizontal scroll → active dot indicator (mobile only;
// no-ops on desktop where the track is a grid with no horizontal overflow).
function setupRowScrolls(){
  document.querySelectorAll('.pkg-row').forEach(row => {
    const track = row.querySelector('.pkg-row-track');
    const dots  = row.querySelectorAll('.pkg-row-dots .dot');
    if (!track || !dots.length) return;
    let raf = 0;
    track.addEventListener('scroll', () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const cards = track.querySelectorAll('.pkg-card');
        if (!cards.length) return;
        const mid = track.scrollLeft + track.clientWidth / 2;
        let activeIdx = 0;
        cards.forEach((card, i) => {
          const cardMid = card.offsetLeft + card.offsetWidth / 2;
          if (Math.abs(cardMid - mid) < Math.abs((cards[activeIdx].offsetLeft + cards[activeIdx].offsetWidth/2) - mid)) activeIdx = i;
        });
        dots.forEach((dot, i) => dot.classList.toggle('active', i === activeIdx));
      });
    }, { passive: true });
  });
}

function applyFilter(){
  document.querySelectorAll('.chip').forEach(el => {
    el.classList.toggle('on', el.dataset.filter === state.filter);
  });
  const url = new URL(location.href);
  if (state.filter === 'all') url.searchParams.delete('type');
  else url.searchParams.set('type', state.filter);
  history.replaceState(null, '', url.toString());
  render();
}

document.querySelectorAll('.chip').forEach(el => {
  el.addEventListener('click', () => { state.filter = el.dataset.filter; applyFilter(); });
});
document.getElementById('sortBy').addEventListener('change', e => { state.sort = e.target.value; render(); });

function confirmByo(){
  return confirm("You'll be redirected to wakanow.com to build a custom travel package. Continue?");
}

function refreshNav(){
  const store = UmrahPortal.load();
  document.getElementById('currencyLabel').textContent = 'NG | ' + (store.currency || 'NGN');
  if (store.user) document.getElementById('authLabel').textContent = 'Hi, ' + store.user.firstName;
}
refreshNav();
renderCounts();
applyFilter();
</script>
</body>
</html>
