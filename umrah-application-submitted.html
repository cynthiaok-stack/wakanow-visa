<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Submitted — Wakanow Umrah</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',system-ui,sans-serif;font-size:16px;color:#1E3138;line-height:1.55;background:#F5F7FA;min-height:100vh}
h1,h2{font-family:'Rubik',system-ui,sans-serif;font-weight:700;line-height:1.2}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}

:root{
  --primary:#08A5E3; --primary-dark:#0789BF; --primary-light:#E8F6FD;
  --navy:#0F2A33;
  --orange:#F58220; --orange-dark:#E07318;
  --green:#27AE60; --green-light:#D8F0DD;
  --gray-100:#F2F3F5; --gray-200:#E5E7EB; --gray-300:#D1D5DB; --gray-500:#6B7280; --gray-600:#4B5563;
  --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --ease:.22s cubic-bezier(.4,0,.2,1);
}

.site-header{background:#fff;padding:14px 40px;box-shadow:0 1px 0 rgba(15,42,51,.06);display:flex;align-items:center;gap:14px}
.site-header .logo{height:32px}
.site-header .manage-app{margin-left:auto;font-size:13px;color:var(--navy);font-weight:600;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;transition:.18s}
.site-header .manage-app:hover{background:var(--gray-100);color:var(--primary-dark)}
.site-header .manage-app i{width:14px;height:14px}
@media(max-width:720px){ .site-header{padding:12px 18px} .site-header .manage-app{font-size:12.5px;padding:7px 10px} .site-header .manage-app span{display:none} }

.shell{max-width:880px;margin:48px auto 60px;padding:0 18px}
@media(max-width:520px){ .shell{margin-top:18px} }

.card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);text-align:center;border:1px solid #EEF1F5;overflow:hidden}

.card-body{padding:56px 32px 48px}
@media(max-width:520px){ .card-body{padding:40px 22px 32px} }

/* Simple solid-tint success ring with check */
.success-ring{width:96px;height:96px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin:0 auto 22px;background:var(--green-light);color:var(--green);animation:wkPop .42s cubic-bezier(.34,1.56,.64,1) both}
.success-ring svg, .success-ring i{width:48px;height:48px;stroke-width:3}
@keyframes wkPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}

.card h1{font-size:30px;color:var(--green);font-weight:700;margin-bottom:20px;letter-spacing:-.01em}
@media(max-width:520px){ .card h1{font-size:22px;margin-bottom:16px} }
.card .lede{font-size:14px;color:var(--gray-600);max-width:560px;margin:0 auto 8px;line-height:1.7}
.card .lede.last{margin-bottom:0}

/* Cyan divider band — full-bleed across the card */
.meta-band{height:6px;background:var(--primary)}

/* Three-column meta footer */
.meta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:28px 40px 32px;align-items:start}
.meta-cell{display:flex;flex-direction:column;gap:8px;min-width:0}
.meta-cell:nth-child(1){text-align:left}
.meta-cell:nth-child(2){text-align:center}
.meta-cell:nth-child(3){text-align:right}
.meta-l{font-size:11px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.meta-v{font-size:18px;color:var(--navy);font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums;word-break:break-word}
@media(max-width:520px){
  .meta-row{grid-template-columns:1fr;padding:22px 22px 26px;gap:18px}
  .meta-cell, .meta-cell:nth-child(1), .meta-cell:nth-child(2), .meta-cell:nth-child(3){text-align:center}
  .meta-v{font-size:16px}
}

/* Print-friendly receipt */
@media print{
  body{background:#fff}
  .site-header{display:none !important}
  .card{box-shadow:none;border:1px solid var(--gray-200)}
}
</style>
<link rel="stylesheet" href="umrah-theme.css">
</head>
<body>

<header class="site-header">
  <a href="saudi-packages.html"><img src="wakanow-logo.svg" alt="Wakanow" class="logo"></a>
  <a href="umrah-signin.html" class="manage-app"><i data-lucide="user-check"></i><span>Manage Application</span></a>
</header>

<div class="shell">
  <div class="card" id="card"></div>
</div>

<script src="umrah-portal-data.js"></script>
<script src="umrah-contact.js" defer></script>
<script>
lucide.createIcons();

const params = new URLSearchParams(location.search);
const bookingId = params.get('bookingId');
const b = bookingId ? UmrahPortal.findBooking(bookingId) : null;
const card = document.getElementById('card');

if (!b){
  card.innerHTML = `
    <div class="card-body">
      <div class="success-ring" style="background:#FEE2E2;color:#DC2626"><i data-lucide="alert-circle"></i></div>
      <h1 style="color:#DC2626">Application not found</h1>
      <p class="lede last">We could not find a visa application for that booking reference. It may have expired or been removed.</p>
    </div>
  `;
  lucide.createIcons();
} else {
  const v = b.visa || {};
  const submittedAt = v.submittedAt ? new Date(v.submittedAt) : new Date();
  const submittedDate = submittedAt
    .toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
    .toUpperCase();
  const status = (v.status || 'Pending');
  const statusFmt = status.charAt(0).toUpperCase() + status.slice(1).toLowerCase();

  card.innerHTML = `
    <div class="card-body">
      <div class="success-ring"><i data-lucide="check"></i></div>
      <h1>Document Submitted</h1>
      <p class="lede">Thank you for applying for your visa with Wakanow.</p>
      <p class="lede last">Our visa team will review your application and documents.<br>If additional information is required, a visa agent will contact you.</p>
    </div>
    <div class="meta-band"></div>
    <div class="meta-row">
      <div class="meta-cell">
        <div class="meta-l">Booking ID:</div>
        <div class="meta-v">${escapeHtml(b.id)}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-l">Application Date</div>
        <div class="meta-v">${escapeHtml(submittedDate)}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-l">Application Status</div>
        <div class="meta-v">${escapeHtml(statusFmt)}</div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
</script>
</body>
</html>
