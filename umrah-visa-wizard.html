<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Application — Wakanow Umrah</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',system-ui,sans-serif;font-size:16px;color:#1E3138;line-height:1.55;background:#F5F7FA;min-height:100vh}
h1,h2,h3,h4{font-family:'Rubik',system-ui,sans-serif;font-weight:700;line-height:1.2}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}

:root{
  --primary:#08A5E3; --primary-dark:#0789BF; --primary-light:#E8F6FD;
  --navy:#0F2A33;
  --orange:#F58220; --orange-dark:#E07318;
  --green:#27AE60;
  --gray-100:#F2F3F5; --gray-200:#E5E7EB; --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563;
  --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 6px 22px rgba(15,42,51,.08);
  --ease:.22s cubic-bezier(.4,0,.2,1);
}

.site-header{background:#fff;padding:14px 32px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 0 rgba(15,42,51,.06);position:sticky;top:0;z-index:30}
.site-header .logo{height:30px}
.site-header .manage-app-link{font-size:12.5px;color:var(--navy);font-weight:600;display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;transition:.18s;cursor:pointer}
.site-header .manage-app-link:hover{background:var(--gray-100);color:var(--primary-dark)}
.site-header .manage-app-link i{width:13px;height:13px}
@media(max-width:600px){ .site-header .manage-app-link{padding:6px 9px} .site-header .manage-app-link span{display:none} }
.site-header .saved{margin-left:auto;font-size:12px;color:var(--gray-500);display:inline-flex;align-items:center;gap:6px;font-weight:500;opacity:.6;transition:.3s}
.site-header .saved.flash{opacity:1;color:var(--green)}
.site-header .saved i{width:13px;height:13px}
.site-header .save-exit{font-size:12.5px;color:var(--navy);font-weight:600;padding:8px 14px;border-radius:8px;background:var(--gray-100);transition:.18s}
.site-header .save-exit:hover{background:var(--gray-200)}
@media(max-width:600px){
  .site-header{padding:12px 16px}
  .site-header .saved span{display:none}
  .site-header .save-exit{padding:7px 10px;font-size:12px}
}

/* Mobile compact header bar — replaces big navy progress on phones */
.mobile-progress{display:none;background:var(--navy);color:#fff;padding:14px 18px;flex-direction:column;gap:8px;position:sticky;top:55px;z-index:25}
.mobile-progress .row{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12.5px}
.mobile-progress .row .step-of{font-weight:600}
.mobile-progress .row .pct{color:rgba(255,255,255,.7)}
.mobile-progress .bar{height:5px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden}
.mobile-progress .fill{height:100%;background:linear-gradient(90deg,var(--primary),#4AC8F3);transition:width .4s ease}
@media(max-width:840px){ .mobile-progress{display:flex} }

/* Desktop: shell with sidebar progress */
.shell{max-width:1100px;margin:0 auto;padding:28px 32px 60px;display:grid;grid-template-columns:260px 1fr;gap:30px;align-items:start}
@media(max-width:840px){ .shell{grid-template-columns:1fr;padding:20px 18px 40px;gap:0} }

.side-progress{background:#fff;border-radius:var(--radius-lg);padding:22px 22px;box-shadow:var(--shadow-sm);position:sticky;top:84px}
@media(max-width:840px){ .side-progress{display:none} }
.side-progress h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);margin-bottom:14px;font-weight:600}
.side-step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;position:relative}
.side-step:not(:last-child)::after{content:'';position:absolute;left:14px;top:32px;bottom:-2px;width:2px;background:var(--gray-200)}
.side-step.done:not(:last-child)::after{background:var(--green)}
.side-step .dot{width:28px;height:28px;border-radius:50%;background:var(--gray-200);color:var(--gray-500);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;z-index:1;transition:var(--ease)}
.side-step .dot i{width:13px;height:13px}
.side-step.done .dot{background:var(--green);color:#fff}
.side-step.on .dot{background:var(--primary);color:#fff;box-shadow:0 0 0 4px rgba(8,165,227,.18)}
.side-step .lbl{padding-top:4px}
.side-step .lbl .name{font-size:13px;color:var(--navy);font-weight:600}
.side-step .lbl .sub{font-size:11px;color:var(--gray-500);margin-top:1px}
.side-step.done .lbl .sub{color:var(--green)}
.side-step.on .lbl .name{color:var(--primary)}
.side-progress .booking-tag{margin-top:14px;padding-top:14px;border-top:1px solid var(--gray-100);font-size:11px;color:var(--gray-500);line-height:1.55}
.side-progress .booking-tag strong{color:var(--navy);display:block;font-size:12px;margin-bottom:2px;font-family:'DM Mono',monospace}

/* Applicant selector (Item 17) */
.applicant-bar{background:#fff;border-radius:var(--radius-lg);padding:14px 18px;box-shadow:var(--shadow-sm);margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.applicant-bar .label{font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;font-weight:600;flex-shrink:0}
.applicant-tabs{display:flex;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
.applicant-tab{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border:1.5px solid var(--gray-200);border-radius:999px;background:#fff;font-size:12.5px;color:var(--gray-600);font-weight:600;transition:var(--ease);cursor:pointer}
.applicant-tab:hover{border-color:var(--gray-300)}
.applicant-tab.on{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.applicant-tab.complete{border-color:#B6E1C6;color:#1F6E3D;background:#E7F6EE}
.applicant-tab.complete.on{background:#D8F0E2;border-color:var(--green)}
.applicant-tab .num{width:20px;height:20px;border-radius:50%;background:var(--gray-200);color:var(--gray-600);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.applicant-tab.on .num{background:var(--primary);color:#fff}
.applicant-tab.complete .num{background:var(--green);color:#fff}
.applicant-tab i{width:12px;height:12px}
.applicant-bar .summary-pct{font-size:11.5px;color:var(--gray-500);font-weight:500;margin-left:auto}
.applicant-bar .summary-pct strong{color:var(--navy)}
@media(max-width:560px){
  .applicant-bar{padding:12px 14px}
  .applicant-bar .summary-pct{margin-left:0;width:100%;text-align:right;border-top:1px solid var(--gray-100);padding-top:10px;margin-top:4px}
}

/* Wizard card */
.wizard-card{background:#fff;border-radius:var(--radius-lg);padding:28px 32px;box-shadow:var(--shadow-sm)}
@media(max-width:600px){ .wizard-card{padding:22px 18px;border-radius:12px} }
.wizard-card h2{font-size:18px;color:var(--navy);margin-bottom:4px;font-weight:700;letter-spacing:-.005em}
.wizard-card .step-sub{font-size:13px;color:var(--gray-500);margin-bottom:22px;line-height:1.55}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:600px){ .form-grid{grid-template-columns:1fr} }
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:var(--navy);font-weight:600}
.field label .req{color:#DC2626;margin-left:2px}
.field input,.field select,.field textarea{padding:11px 13px;border:1.5px solid var(--gray-200);border-radius:9px;background:#fff;color:var(--navy);transition:var(--ease);font-size:13.5px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(8,165,227,.14)}
.field input:disabled,.field select:disabled,.field textarea:disabled{background:#F2F3F5;color:var(--gray-500);cursor:not-allowed;border-color:#E5E7EB;opacity:.85}
.field.invalid input,.field.invalid select,.field.invalid textarea{border-color:#DC2626;background:#FEF2F2}

/* Locked-step banner shown on Step 1 / Step 2 when data was captured pre-payment */
.locked-banner{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid #B6E1C6;background:linear-gradient(135deg,#E7F6EE 0%,#F0FAF4 100%);border-radius:11px;margin-bottom:18px;color:#1F6E3D;font-size:13px;line-height:1.5}
.locked-banner i.lock-ic{width:18px;height:18px;flex-shrink:0;color:var(--green)}
.locked-banner .x{flex:1;line-height:1.45}
.locked-banner .x strong{display:block;font-size:13px;color:#1F6E3D;font-weight:700;margin-bottom:2px}
.locked-banner .x span{font-size:12px;color:#387C58}
.locked-banner .edit-btn{flex-shrink:0;background:#fff;color:#1F6E3D;border:1.5px solid #B6E1C6;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:var(--ease)}
.locked-banner .edit-btn:hover{background:#F0FAF4;border-color:var(--green)}
.locked-banner .edit-btn i{width:13px;height:13px}
@media(max-width:560px){
  .locked-banner{flex-wrap:wrap}
  .locked-banner .edit-btn{margin-left:auto}
}
.field .hint{font-size:11px;color:var(--gray-500)}
.field .err{font-size:11.5px;color:#DC2626;display:none;align-items:center;gap:4px;font-weight:500}
.field .err i{width:12px;height:12px}
.field.invalid .err{display:inline-flex}

.doc-row{border:1.5px dashed var(--gray-300);border-radius:11px;padding:18px;text-align:center;color:var(--gray-500);cursor:pointer;transition:var(--ease);margin-bottom:12px;background:#FAFBFC}
.doc-row:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.doc-row i{width:26px;height:26px;margin-bottom:6px;display:inline-block}
.doc-row.ok{border-color:var(--green);color:var(--green);background:#F0FAF4;border-style:solid}
.doc-row .meta{font-size:11px;color:var(--gray-500);margin-top:3px}
.doc-row.ok .meta{color:var(--green)}

/* Upload info banner (50KB cap notice) */
.upload-info-banner{display:flex;align-items:flex-start;gap:10px;background:#E8F6FD;border:1px solid #B8DDF0;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12.5px;color:var(--navy);line-height:1.5}
.upload-info-banner i{width:16px;height:16px;color:var(--primary);flex-shrink:0;margin-top:1px}
.upload-info-banner strong{font-weight:700}

/* Locked doc row (passport — collected at booking) */
.doc-row.locked{border:1.5px solid var(--green);background:#F0FAF4;cursor:default;text-align:left;padding:14px 16px;display:flex;align-items:center;gap:14px}
.doc-row.locked:hover{border-color:var(--green);color:inherit;background:#F0FAF4}
.doc-row.locked .doc-thumb{width:46px;height:46px;border-radius:8px;overflow:hidden;background:#fff;border:1px solid var(--gray-200);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.doc-row.locked .doc-thumb img{width:100%;height:100%;object-fit:cover}
.doc-row.locked .doc-thumb i{width:20px;height:20px;color:var(--gray-400);margin:0}
.doc-row.locked .doc-info{flex:1;min-width:0;text-align:left}
.doc-row.locked .doc-info .n{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row.locked .doc-info .meta{font-size:11px;color:var(--green);margin-top:2px;font-weight:500}
.doc-row.locked .doc-edit-link{font-size:11.5px;color:var(--primary);font-weight:600;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
.doc-row.locked .doc-edit-link:hover{text-decoration:underline}
.doc-row.locked .doc-edit-link i{width:12px;height:12px;margin:0}

/* Filled (uploaded) doc row — with thumbnail + remove */
.doc-row.ok.filled{cursor:default;text-align:left;display:flex;align-items:center;gap:14px;padding:14px 16px}
.doc-row.ok.filled:hover{background:#F0FAF4;color:var(--green)}
.doc-row.ok.filled .doc-thumb{width:46px;height:46px;border-radius:8px;overflow:hidden;background:#fff;border:1px solid #B6E1C6;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.doc-row.ok.filled .doc-thumb img{width:100%;height:100%;object-fit:cover}
.doc-row.ok.filled .doc-thumb i{width:20px;height:20px;color:var(--green);margin:0}
.doc-row.ok.filled .doc-info{flex:1;min-width:0;text-align:left}
.doc-row.ok.filled .doc-info .n{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row.ok.filled .doc-info .meta{font-size:11px;color:var(--green);margin-top:2px;font-weight:500}
.doc-row .doc-remove{flex-shrink:0;width:28px;height:28px;border-radius:7px;background:#fff;border:1px solid var(--gray-200);color:#DC2626;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--ease)}
.doc-row .doc-remove:hover{background:#FEF2F2;border-color:#FCA5A5}
.doc-row .doc-remove i{width:14px;height:14px;margin:0}

/* Inline 50KB error */
.doc-error{display:none;font-size:11.5px;color:#DC2626;margin:-6px 0 12px;padding:8px 12px;background:#FEF2F2;border-left:3px solid #DC2626;border-radius:0 7px 7px 0;font-weight:500;line-height:1.4;align-items:center;gap:6px}
.doc-error.show{display:flex}
.doc-error i{width:13px;height:13px;flex-shrink:0}

/* Pills */
.optional-tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:600;color:var(--gray-600);background:var(--gray-100);border:1px solid var(--gray-200);padding:2px 7px;border-radius:99px;letter-spacing:.02em;margin-left:auto}
.completed-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:#1F6E3D;background:#E7F6EE;border:1px solid #B6E1C6;padding:2px 8px;border-radius:99px;letter-spacing:.02em;margin-left:auto}
.completed-badge i{width:11px;height:11px;color:var(--green);margin:0}

.doc-label{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:8px;margin-top:14px}
.doc-label:first-child{margin-top:0}
.doc-label i{width:15px;height:15px;color:var(--primary)}
.doc-label .req{color:#DC2626}

.review{background:var(--gray-100);border-radius:11px;padding:16px 20px;margin-bottom:18px}
.review h4{font-size:12px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.review h4 a{font-size:11px;color:var(--primary);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer}
.review h4 a:hover{text-decoration:underline}
.review-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--gray-600);gap:16px;align-items:flex-start}
.review-row .k{color:var(--gray-500);flex-shrink:0}
.review-row .v{color:var(--navy);font-weight:600;text-align:right;line-height:1.4}
.review-row .v.miss{color:#DC2626;font-weight:500}

.declare{border:1px solid var(--gray-200);border-radius:11px;padding:18px;margin-bottom:18px;font-size:12px;color:var(--gray-600);line-height:1.6;background:#FAFBFC}
.declare label{display:flex;gap:10px;align-items:flex-start;margin-top:12px;font-size:13px;color:var(--navy);cursor:pointer}
.declare input{margin-top:3px;flex-shrink:0}
.declare strong{color:var(--navy)}

.completion-card{background:linear-gradient(135deg,#E8F6FD 0%,#F4FAFE 100%);border:1px solid #B8DDF0;border-radius:11px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--navy)}
.completion-card.complete{background:linear-gradient(135deg,#E7F6EE 0%,#F0FAF4 100%);border-color:#B6E1C6;color:#1F6E3D}
.completion-card i{width:18px;height:18px;flex-shrink:0;color:var(--primary)}
.completion-card.complete i{color:var(--green)}
.completion-card .x{display:flex;flex-direction:column;line-height:1.4}
.completion-card .x strong{font-weight:700;font-size:13px}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px;flex-wrap:wrap}
.btn{padding:13px 22px;border-radius:11px;font-size:13.5px;font-weight:600;transition:var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:46px;cursor:pointer;border:none}
.btn i{width:14px;height:14px}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 6px 14px rgba(245,130,32,.28)}
.btn-primary:hover:not(:disabled){background:var(--orange-dark);box-shadow:0 8px 18px rgba(245,130,32,.36)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed;box-shadow:none}
.btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--gray-200)}
.btn-ghost:hover{border-color:var(--gray-300);background:var(--gray-100)}

@media(max-width:600px){
  .nav-row{display:none}    /* hidden in favor of sticky bar on mobile */
}

/* Mobile sticky CTA bar */
.mobile-cta{display:none;position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #DEE3EC;box-shadow:0 -10px 28px rgba(15,42,51,.10);padding:12px 14px env(safe-area-inset-bottom);z-index:50;gap:10px;align-items:center}
.mobile-cta .btn{flex:1;padding:13px 14px;font-size:13.5px;min-height:48px}
.mobile-cta .btn-ghost{flex:0 0 auto;width:48px;padding:0}
@media(max-width:600px){
  .mobile-cta{display:flex}
  body.has-mobile-cta{padding-bottom:88px}
}

.not-found{background:#fff;border-radius:var(--radius-lg);padding:60px 20px;text-align:center;color:var(--gray-500);box-shadow:var(--shadow-sm)}

/* Yes/No toggle group */
.yn-group{display:inline-flex;gap:0;background:var(--gray-100);border-radius:9px;padding:3px;border:1.5px solid var(--gray-200);overflow:hidden}
.yn-group button{padding:8px 18px;font-size:12.5px;font-weight:600;color:var(--gray-600);border-radius:7px;transition:var(--ease);background:transparent;min-width:62px}
.yn-group button.on{background:#fff;color:var(--navy);box-shadow:0 2px 6px rgba(15,42,51,.10)}
.yn-group button.on[data-v="Yes"]{color:var(--primary)}
.yn-group button.on[data-v="No"]{color:#475569}

/* Disclosure rows: question + Y/N on the right */
.disc-section{margin-top:18px;padding-top:14px;border-top:1px solid var(--gray-100)}
.disc-section:first-of-type{margin-top:6px;padding-top:0;border-top:none}
.disc-section h3{font-size:13px;color:var(--navy);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:8px}
.disc-section h3 i{width:15px;height:15px;color:var(--primary)}
.disc-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px dashed var(--gray-100);font-size:13px;color:var(--navy)}
.disc-row:last-child{border-bottom:none}
.disc-row .q{flex:1;line-height:1.45;font-weight:500}
.disc-row .req{color:#DC2626;margin-left:2px}
.disc-row.invalid{background:#FEF2F2;border-radius:8px;padding-left:10px;padding-right:10px;border-bottom-color:transparent}
.conditional.invalid{border-left-color:#DC2626;background:#FEF2F2}
@media(max-width:560px){
  .disc-row{flex-direction:column;align-items:stretch;gap:8px}
  .disc-row .yn-group{align-self:flex-start}
}

/* Conditional reveal */
.conditional{display:none;margin-top:10px;padding:14px 16px;background:#F4FAFE;border-left:3px solid var(--primary);border-radius:0 9px 9px 0}
.conditional.show{display:block}
.conditional h4{font-size:12px;color:var(--navy);margin-bottom:10px;font-weight:700}

/* "Please provide details" inline reveal under Y/N rows (lighter than .conditional) */
.cond-text{display:none;margin:6px 0 4px;padding:0 2px;animation:condTextReveal .18s ease}
.cond-text.show{display:block}
.cond-text label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px}
.cond-text label .req{color:#DC2626;margin-left:2px}
.cond-text textarea{width:100%;min-height:64px;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:9px;background:#fff;color:var(--navy);font-size:13px;line-height:1.5;resize:vertical;font-family:inherit;transition:var(--ease)}
.cond-text textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(8,165,227,.12)}
.cond-text.invalid textarea{border-color:#DC2626;background:#FEF2F2}
@keyframes condTextReveal{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── Visa questionnaire sub-wizard (Step 4 — internal 4-step questionnaire) ── */
.disc-progress{display:flex;gap:10px;align-items:center;margin:0 0 22px;padding:0;list-style:none}
.disc-progress .seg{flex:1;display:flex;flex-direction:column;gap:7px;cursor:default;opacity:.55;transition:var(--ease);user-select:none}
.disc-progress .seg.reachable{cursor:pointer;opacity:1}
.disc-progress .seg.reachable:hover .bar{filter:brightness(.96)}
.disc-progress .seg .bar{height:4px;border-radius:99px;background:var(--gray-200);transition:background var(--ease)}
.disc-progress .seg.done .bar{background:var(--green)}
.disc-progress .seg.on .bar{background:var(--primary)}
.disc-progress .seg .meta{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--gray-500);font-weight:600;line-height:1.25}
.disc-progress .seg.on .meta{color:var(--primary)}
.disc-progress .seg.done .meta{color:var(--green)}
.disc-progress .seg .num{width:18px;height:18px;border-radius:50%;background:var(--gray-200);color:var(--gray-500);display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0;transition:var(--ease)}
.disc-progress .seg .num i{width:11px;height:11px}
.disc-progress .seg.on .num{background:var(--primary);color:#fff}
.disc-progress .seg.done .num{background:var(--green);color:#fff}
@media(max-width:768px){
  .disc-progress{position:sticky;top:128px;background:#fff;padding:12px 0 10px;z-index:6;margin:-4px 0 14px;gap:6px}
  .disc-progress .seg .meta span.label{display:none}
  .disc-progress .seg .meta{font-size:11px}
}

.disc-substep{animation:discSubSlide .25s cubic-bezier(.4,0,.2,1)}
@keyframes discSubSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.disc-substep h3.disc-sub-title{font-family:'Rubik',system-ui,sans-serif;font-size:15px;color:var(--navy);margin-bottom:14px;font-weight:700;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--gray-100)}
.disc-substep h3.disc-sub-title i{width:16px;height:16px;color:var(--primary)}
.disc-substep .disc-row{padding:14px 0}
.disc-substep .disc-row + .conditional,
.disc-substep .disc-row + .cond-text{margin-top:0;margin-bottom:8px}

.disc-substep-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:32px;padding-top:18px;border-top:1px solid var(--gray-100);flex-wrap:wrap}
.disc-substep-nav .btn{padding:12px 22px;border-radius:10px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;border:1.5px solid transparent;font-family:inherit;cursor:pointer;transition:var(--ease);min-height:44px;line-height:1}
.disc-substep-nav .btn i{width:14px;height:14px}
.disc-substep-nav .btn-disc-back{background:#fff;color:var(--navy);border-color:var(--gray-200)}
.disc-substep-nav .btn-disc-back:hover{border-color:var(--gray-300);background:var(--gray-100)}
.disc-substep-nav .btn-disc-continue{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 6px 14px rgba(8,165,227,.22)}
.disc-substep-nav .btn-disc-continue:hover{background:var(--primary-dark);border-color:var(--primary-dark);box-shadow:0 8px 18px rgba(8,165,227,.30)}
@media(max-width:768px){
  .disc-substep-nav{display:none} /* on mobile we use the sticky CTA bar instead */
}

/* Inline 2-col field grid used inside disclosure sub-steps */
.disc-pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
@media(max-width:768px){ .disc-pair-grid{grid-template-columns:1fr} }

/* Repeater entries */
.repeater{display:flex;flex-direction:column;gap:10px}
.rep-entry{background:#fff;border:1.5px solid var(--gray-200);border-radius:10px;padding:12px}
.rep-entry .rep-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:10px;align-items:flex-end}
@media(max-width:600px){ .rep-entry .rep-grid{grid-template-columns:1fr 1fr;gap:8px} .rep-entry .rep-grid > .rm{grid-column:1/-1;justify-self:end} }
.rep-entry .rm{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;padding:8px 10px;border-radius:8px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;height:38px}
.rep-entry .rm i{width:13px;height:13px}
.rep-entry .rm:hover{background:#FEE2E2}
.rep-add{align-self:flex-start;background:var(--primary-light);color:var(--primary);border:1.5px dashed var(--primary);padding:9px 14px;border-radius:9px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;margin-top:4px}
.rep-add:hover{background:#D8EEFC}
.rep-add i{width:13px;height:13px}
.rep-empty{font-size:12px;color:var(--gray-500);font-style:italic;padding:6px 0}

/* Phone (country code + number) */
.phone-row{display:grid;grid-template-columns:110px 1fr;gap:8px}

/* Title + first name (small select inline with input — mirrors PAX form) */
.title-row{display:grid;grid-template-columns:88px 1fr;gap:8px}

/* Section divider inside a step */
.section-head{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);font-weight:700;margin:18px 0 8px;padding-top:14px;border-top:1px solid var(--gray-100);display:flex;align-items:center;gap:8px}
.section-head:first-child{margin-top:0;padding-top:0;border-top:none}
.section-head i{width:15px;height:15px;color:var(--primary)}

/* Contact information block (mirrors PAX form's "Who should we contact?") */
.contact-info-block{background:#FAFBFC;border:1px solid var(--gray-200);border-radius:11px;padding:18px 20px;margin-bottom:18px}
.contact-info-block h4{font-size:13px;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px;font-weight:700}
.contact-info-block h4 i{width:15px;height:15px;color:var(--primary)}
.contact-info-block .muted{font-size:12px;color:var(--gray-500);margin-bottom:14px}

/* Consent checkboxes (Step 6) */
.consent-list{display:flex;flex-direction:column;gap:10px;margin:8px 0 18px}
.consent-list label{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:10px;background:#FAFBFC;cursor:pointer;transition:var(--ease);font-size:13px;color:var(--navy);line-height:1.5}
.consent-list label:hover{border-color:var(--gray-300)}
.consent-list label.checked{border-color:var(--green);background:#F0FAF4}
.consent-list input{margin-top:3px;flex-shrink:0;width:16px;height:16px;accent-color:var(--green)}

/* ── Service section heading (used for Flight, Hotel, Transfer, Ground) ── */
.svc-section{margin-top:18px;padding-top:0}
.svc-section:first-of-type{margin-top:0}
.svc-section + .svc-section{margin-top:24px;padding-top:24px;border-top:1px solid var(--gray-100)}
.svc-section .svc-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.svc-section .svc-head .svc-title{font-size:15px;font-weight:700;color:var(--navy);font-family:'Rubik',system-ui,sans-serif;display:inline-flex;align-items:center;gap:8px}
.svc-section .svc-head .svc-title i{width:16px;height:16px;color:var(--primary)}
.svc-section .svc-head .embassy-note{font-size:12px;color:var(--primary);font-weight:600}
.svc-section .svc-toggle{display:flex;align-items:center;gap:14px;padding:11px 0;font-size:13px;color:var(--navy);font-weight:500}
.svc-section .svc-toggle .q{flex:1;line-height:1.45}
.svc-section .svc-body{display:none;margin-top:14px;padding:16px;background:#FAFBFC;border:1px solid var(--gray-200);border-radius:11px;animation:svcReveal var(--ease)}
.svc-section .svc-body.show{display:block}
@keyframes svcReveal{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.svc-section .svc-sub{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px}
@media(max-width:560px){
  .svc-section .svc-toggle{flex-direction:column;align-items:flex-start;gap:8px}
  .svc-section .svc-toggle .yn-group{align-self:flex-start}
}

/* ── 3-column grid for service forms (collapses to 1 col on mobile) ── */
.form-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:760px){ .form-grid-3{grid-template-columns:1fr} }

/* ── ₦ price prefix for currency inputs ── */
.field.price{position:relative}
.field.price input{padding-left:30px}
.field.price::before{content:'₦';position:absolute;left:13px;top:32px;font-size:13.5px;font-weight:600;color:var(--gray-500);pointer-events:none;z-index:1}

/* ── Search Flight CTA — primary blue, right-aligned ── */
.flight-search-actions{display:flex;justify-content:flex-end;margin-top:14px}
.btn-search-flight{background:var(--primary);color:#fff;padding:11px 22px;border-radius:10px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:var(--ease);border:none;cursor:pointer;box-shadow:0 4px 14px rgba(8,165,227,.22)}
.btn-search-flight:hover{background:var(--primary-dark);box-shadow:0 6px 18px rgba(8,165,227,.30)}
.btn-search-flight i{width:14px;height:14px}

/* ── Flight result cards ── */
.flight-list-head{font-size:13px;font-weight:700;color:var(--navy);margin:18px 0 10px}
.flight-list{display:flex;flex-direction:column;gap:10px}
.flight-card{display:flex;align-items:center;gap:16px;padding:13px 16px;border:1.5px solid var(--gray-200);border-radius:11px;transition:var(--ease);cursor:pointer;background:#fff}
.flight-card:hover{border-color:var(--primary);box-shadow:0 2px 10px rgba(8,165,227,.08)}
.flight-card .a{flex:1.4;font-weight:700;font-size:13.5px;color:var(--navy)}
.flight-card .b{flex:1.4;font-size:12.5px;color:var(--gray-500)}
.flight-card .c{flex:1.4;font-size:12.5px;color:var(--navy);font-weight:500}
.flight-card .btn-sel{background:#fff;border:1.5px solid var(--gray-200);color:var(--navy);padding:7px 18px;font-size:12.5px;font-weight:600;border-radius:8px;cursor:pointer;transition:var(--ease)}
.flight-card .btn-sel:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
@media(max-width:560px){
  .flight-card{flex-wrap:wrap;gap:6px}
  .flight-card .a{flex:1 0 100%}
  .flight-card .b,.flight-card .c{flex:1 0 auto;font-size:12px}
  .flight-card .btn-sel{margin-left:auto}
}

/* ── Selected flight (cyan card with Change button) ── */
.flight-selected{display:flex;align-items:center;gap:16px;padding:16px 18px;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);border-radius:12px;box-shadow:0 4px 14px rgba(8,165,227,.22);color:#fff;margin-bottom:14px}
.flight-selected .a{flex:1.4;color:#fff;font-weight:700;font-size:13.5px}
.flight-selected .b{flex:2;color:#fff;font-weight:700;font-size:13.5px}
.flight-selected .b small{display:block;font-weight:400;font-size:12px;opacity:.85;margin-top:2px}
.flight-selected .btn-change{background:transparent;border:1.5px solid rgba(255,255,255,.55);color:#fff;padding:7px 18px;font-size:12.5px;font-weight:600;border-radius:8px;cursor:pointer;transition:var(--ease)}
.flight-selected .btn-change:hover{background:rgba(255,255,255,.12);border-color:#fff}
@media(max-width:560px){
  .flight-selected{flex-wrap:wrap;gap:8px}
  .flight-selected .btn-change{margin-left:auto}
}

/* ── Declaration page (Page 3) ── */
.declaration-card{border:1px solid var(--gray-200);border-radius:12px;padding:8px 22px;background:#FAFBFC;margin-bottom:22px}
.declaration-row{display:flex;gap:12px;align-items:flex-start;padding:14px 0;cursor:pointer}
.declaration-row + .declaration-row{border-top:1px solid #EEF1F5}
.declaration-row input[type="checkbox"]{flex-shrink:0;width:18px;height:18px;margin-top:2px;accent-color:var(--primary);cursor:pointer}
.declaration-row .t{font-size:14px;color:var(--navy);line-height:1.55}

/* ── Submit Application button (full-width orange, gated) ── */
.btn-submit-app{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:var(--ease);box-shadow:0 6px 14px rgba(245,130,32,.28)}
.btn-submit-app:hover:not(:disabled){background:var(--orange-dark);box-shadow:0 8px 20px rgba(245,130,32,.36)}
.btn-submit-app:disabled{background:var(--gray-300);cursor:not-allowed;box-shadow:none}
.btn-submit-app i{width:16px;height:16px}
.btn-submit-app .spin{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:btnSpin .8s linear infinite}
.btn-submit-app.loading .spin{display:inline-block}
.btn-submit-app.loading i,.btn-submit-app.loading span{display:none}
@keyframes btnSpin{to{transform:rotate(360deg)}}

/* ── Side-progress: condense for 9 steps (smaller dot row spacing) ── */
@media(min-width:841px){
  .side-progress .side-step{padding:7px 0}
  .side-progress .side-step .dot{width:24px;height:24px;font-size:11px}
  .side-progress .side-step:not(:last-child)::after{left:12px;top:28px}
  .side-progress .side-step .lbl .name{font-size:12.5px}
  .side-progress .side-step .lbl .sub{font-size:10.5px}
}

/* Auth gate placeholder while modal loads */
.auth-gate{background:#fff;border-radius:var(--radius-lg);padding:60px 24px;text-align:center;color:var(--gray-500);box-shadow:var(--shadow-sm);max-width:520px;margin:60px auto}
.auth-gate i{width:48px;height:48px;color:var(--primary);display:inline-block;margin-bottom:14px}
.auth-gate h3{color:var(--navy);font-size:18px;margin-bottom:6px}
.auth-gate p{font-size:13px;margin-bottom:20px}
.auth-gate .btn{padding:13px 26px}

/* Welcome-back toast — shown once after returning from signin (?welcome=1).
   Pinned top-center, slides down, auto-dismisses after 3s. */
.welcome-toast{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:99px;font-size:13.5px;font-weight:500;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 30px rgba(15,42,51,.22);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease}
.welcome-toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.welcome-toast i{width:16px;height:16px;color:#4AC8F3}
@media(max-width:600px){ .welcome-toast{top:64px;font-size:12.5px;padding:9px 14px} }
</style>

<body>

<header class="site-header">
  <a href="saudi-packages.html"><img src="wakanow-logo.svg" alt="Wakanow" class="logo"></a>
  <a href="umrah-signin.html" class="manage-app-link" title="Continue an existing visa application">
    <i data-lucide="user-check"></i><span>Manage Application</span>
  </a>
  <span class="saved" id="savedIndicator"><i data-lucide="check-circle"></i> <span>Progress saved</span></span>
  <button class="save-exit" type="button" onclick="saveAndExit()">Save &amp; exit</button>
</header>

<div class="mobile-progress" id="mobileProgress" style="display:none">
  <div class="row">
    <span class="step-of" id="mobStepOf">Step 1 of 6</span>
    <span class="pct" id="mobPct">0%</span>
  </div>
  <div class="bar"><div class="fill" id="mobFill" style="width:0%"></div></div>
  <div class="row" style="font-size:12px;color:rgba(255,255,255,.85);margin-top:2px">
    <span id="mobStepName">Biographical</span>
    <span id="mobApplicantTag"></span>
  </div>
</div>

<div class="shell" id="shell"></div>

<div class="mobile-cta" id="mobileCta" style="display:none">
  <button class="btn btn-ghost" id="mobBackBtn" type="button" aria-label="Back"><i data-lucide="arrow-left"></i></button>
  <button class="btn btn-primary" id="mobNextBtn" type="button">Save &amp; continue <i data-lucide="arrow-right"></i></button>
</div>

<script src="umrah-portal-data.js"></script>
<script src="umrah-contact.js" defer></script>
<script src="umrah-auth.js" defer></script>
<script>
lucide.createIcons();

const bookingId = new URLSearchParams(location.search).get('bookingId');
let booking = UmrahPortal.findBooking(bookingId);
const shell = document.getElementById('shell');

const STEPS = [
  { key: 'personal',    label: 'Personal',    sub: 'Tell us about yourself',        icon: 'user' },
  { key: 'passport',    label: 'Passport',    sub: 'Passport & residency details',  icon: 'book-open' },
  { key: 'travel',      label: 'Travel',      sub: 'Trip + travel history',         icon: 'plane' },
  { key: 'disclosures', label: 'Disclosures', sub: 'Background, health & family',   icon: 'shield-check' },
  { key: 'flight',      label: 'Flight',      sub: 'Flight & contact details',      icon: 'plane-takeoff' },
  { key: 'services',    label: 'Services',    sub: 'Hotel, transfer, ground',       icon: 'concierge-bell' },
  { key: 'docs',        label: 'Documents',   sub: 'Bio-page, photo, vaccination',  icon: 'file-text' },
  { key: 'review',      label: 'Review',      sub: 'Verify your application',       icon: 'list-checks' },
  { key: 'declare',     label: 'Submit',      sub: 'Declaration & submit',          icon: 'send' }
];

/* ── Mock data for Flight + Services steps (no real APIs) ── */
const MOCK_INBOUND_FLIGHTS = [
  { airline: 'Brussels Airlines', dest: 'Saudi Arabia', date: '01 Oct 2026', time: '09:00 PM' },
  { airline: 'Turkish Airlines',  dest: 'Saudi Arabia', date: '01 Oct 2026', time: '11:30 PM' },
  { airline: 'Saudi Airlines',    dest: 'Saudi Arabia', date: '02 Oct 2026', time: '06:00 AM' },
  { airline: 'Egypt Air',         dest: 'Saudi Arabia', date: '01 Oct 2026', time: '03:15 PM' },
  { airline: 'Emirates',          dest: 'Saudi Arabia', date: '02 Oct 2026', time: '01:00 AM' }
];
const MOCK_OUTBOUND_FLIGHTS = [
  { airline: 'BIRDY AIRLINES S.A.', dest: 'Netherlands', date: '20 Oct 2026', time: '09:00 PM' },
  { airline: 'Turkish Airlines',    dest: 'Nigeria',     date: '20 Oct 2026', time: '07:45 PM' },
  { airline: 'Saudi Airlines',      dest: 'Nigeria',     date: '21 Oct 2026', time: '04:30 AM' },
  { airline: 'Emirates',            dest: 'Nigeria',     date: '20 Oct 2026', time: '11:00 PM' }
];
const MOCK_HOTELS = ['GABER GABER','Hilton Suites Makkah','Swissotel Al Maqam','Pullman ZamZam','Dar Al Tawhid Intercontinental'];
const MOCK_TRANSFER_PROVIDERS = ['Al Safwa Transport','Makkah Express Transfers','Saudi Limousine','Haramain Shuttle Services'];
const MOCK_GROUND_OPERATORS = ['BASIC GROUND SERVICE','AL SAFWA TRANSPORT','PREMIUM GROUND LOGISTICS','HARAMAIN GROUND CO.'];
const MOCK_VEHICLE_MAKES = ['Toyota','Hyundai','GMC','Mercedes-Benz'];
const MOCK_VEHICLE_TYPES = ['Sedan','SUV','Van','Bus','Minibus'];
const MOCK_TRIP_CATEGORIES = ['Airport Pickup','Airport Drop-off','Inter-city Transfer','Local Transfer'];

/* Default array fields (recent travel, past visas, family in KSA) */
function defaultArrays(){
  return {
    recentTravel: [],   // {country, date, length}
    pastVisa: [],       // {country, date, length}
    familyKsa: []       // {name, relation}
  };
}

let currentApplicantIdx = 0;

if (!booking){
  shell.innerHTML = `<div class="not-found"><h2>Visa application not found</h2><p style="margin-top:8px">This booking either doesn't exist, isn't a Visa+Package booking, or has been completed.</p><p style="margin-top:14px"><a href="saudi-packages.html" style="color:var(--primary);font-weight:600">→ Back to home</a></p></div>`;
} else if (!booking.preQualification || booking.preQualification.status !== 'passed') {
  // Per spec: the wizard is gated by pre-qualification. Send the user to the
  // qualify page; if they failed pre-qual the qualify page renders the
  // support state, otherwise it resumes them at the right tier/step.
  location.replace('umrah-qualify.html?bookingId=' + encodeURIComponent(bookingId));
} else if (!booking.visa){
  shell.innerHTML = `<div class="not-found"><h2>Visa application not found</h2><p style="margin-top:8px">This booking either doesn't exist, isn't a Visa+Package booking, or has been completed.</p><p style="margin-top:14px"><a href="saudi-packages.html" style="color:var(--primary);font-weight:600">→ Back to home</a></p></div>`;
} else {
  ensureMigratedApplicants();
  if (UmrahPortal.hasSessionAuth(bookingId)){
    boot();
  } else {
    showAuthGate();
  }
}

/* ----- Auth gate: require booking-id+code verification once per session ----- */
// Per Manage Application spec: there is no inline modal or interstitial. If the
// session isn't already verified, send the user to the dedicated signin page.
// On successful verification there, signin redirects back here with ?welcome=1
// so we know to show the one-shot "Welcome back" toast.
function showAuthGate(){
  location.replace('umrah-signin.html?bookingId=' + encodeURIComponent(bookingId || ''));
}

/* ----- Backwards-compat: turn legacy visa.formData into per-applicant array --- */
function ensureMigratedApplicants(){
  const v = booking.visa;
  // TEMP: only render a single applicant form, regardless of booking quantity.
  // Trim any pre-existing extra applicants (from earlier multi-pax test data).
  if (Array.isArray(v.applicants) && v.applicants.length > 1){
    v.applicants = v.applicants.slice(0, 1);
    UmrahPortal.updateVisa(bookingId, { applicants: v.applicants });
    booking = UmrahPortal.findBooking(bookingId);
  }
  if (!Array.isArray(v.applicants) || !v.applicants.length){
    const count = 1; // booking.quantity || 1 — capped to 1 for now
    const seedFromPax = Array.isArray(booking.passengers) ? booking.passengers : [];
    v.applicants = [];
    const cartContact = (booking.contact || {});
    for (let i = 0; i < count; i++){
      const pax = seedFromPax[i] || {};
      const seedFormData = Object.assign(defaultArrays(), i === 0 ? (v.formData || {}) : {});
      // Pre-populate from passenger info captured at checkout — ALL wizard step 1+2 fields
      // come from checkout's PAX form, so steps 1 and 2 can lock as "already provided".
      const map = {
        title: 'title', firstName: 'firstName', lastName: 'lastName', middleName: 'middleName',
        mobileCC: 'mobileCC', mobile: 'mobile', email: 'email', applyingFrom: 'applyingFrom',
        dob: 'dob', gender: 'gender', marital: 'marital', nationality: 'nationality', birthCountry: 'birthCountry',
        passport: 'passportNo', issueCountry: 'issueCountry', issueDate: 'issueDate',
        expiry: 'expiryDate', passportType: 'passportType'
      };
      Object.keys(map).forEach(srcKey => {
        const dstKey = map[srcKey];
        if (pax[srcKey] && !seedFormData[dstKey]) seedFormData[dstKey] = pax[srcKey];
      });
      // Lead applicant inherits booking contact when missing
      if (i === 0){
        if (cartContact.email) seedFormData.email = seedFormData.email || cartContact.email;
        if (cartContact.phone) seedFormData.mobile = seedFormData.mobile || cartContact.phone;
      }
      // Migrate legacy single 'fullName' to first/last
      if (seedFormData.fullName && !seedFormData.firstName){
        const parts = String(seedFormData.fullName).split(/\s+/);
        seedFormData.firstName = parts.shift() || '';
        seedFormData.lastName = parts.join(' ');
      }
      // Migrate legacy 'issuer' to issueCountry
      if (seedFormData.issuer && !seedFormData.issueCountry) seedFormData.issueCountry = seedFormData.issuer;
      // Ensure array fields exist
      ['recentTravel','pastVisa','familyKsa'].forEach(k => {
        if (!Array.isArray(seedFormData[k])) seedFormData[k] = [];
      });
      const fullName = seedFormData.firstName || seedFormData.lastName
        ? `${seedFormData.firstName || ''} ${seedFormData.lastName || ''}`.trim()
        : (i === 0 ? 'Lead applicant' : `Applicant ${i+1}`);
      // Lock state — steps that came from checkout start LOCKED. Toggle via Edit button.
      const step1Filled = seedFormData.firstName && seedFormData.lastName && seedFormData.dob && seedFormData.gender;
      const step2Filled = seedFormData.passportNo && seedFormData.issueCountry && seedFormData.expiryDate;
      // First-open should land on Step 3 if 1+2 are pre-filled — saves the user from
      // re-traversing identical data. They can still click step 1/2 in the sidebar.
      const startStep = (step1Filled && step2Filled) ? 3 : 1;
      // For the lead applicant, preserve any genuine in-progress step from a legacy
      // single-applicant flow (Math.max), but never let the default seed value (1)
      // override startStep when the user already provided steps 1+2 pre-payment.
      const leadStep = Math.max(Number(v.currentStep) || 1, startStep);
      v.applicants.push({
        idx: i,
        name: fullName,
        currentStep: i === 0 ? leadStep : startStep,
        completedSteps: [],
        formData: seedFormData,
        documents: i === 0 ? [...(v.documents || [])] : [],
        complete: false,
        locked: { 1: !!step1Filled, 2: !!step2Filled }
      });
    }
    UmrahPortal.updateVisa(bookingId, { applicants: v.applicants });
    booking = UmrahPortal.findBooking(bookingId);
  }
}

/* ----- Boot the wizard once auth is satisfied -------------------------------- */
function boot(){
  document.body.classList.add('has-mobile-cta');
  document.getElementById('mobileProgress').style.display = '';
  document.getElementById('mobileCta').style.display = '';
  // Pick the first incomplete applicant
  const idx = booking.visa.applicants.findIndex(a => !a.complete);
  currentApplicantIdx = idx === -1 ? 0 : idx;
  render();
  // Welcome-back toast — only when arriving from the signin page (?welcome=1).
  // Auto-dismiss after 3s and strip the param so a refresh doesn't re-trigger.
  maybeShowWelcomeBackToast();
}

function maybeShowWelcomeBackToast(){
  const params = new URLSearchParams(location.search);
  if (params.get('welcome') !== '1') return;
  const a = applicant() || {};
  const f = a.formData || {};
  const firstName = (f.firstName || (booking.passengers && booking.passengers[0] && booking.passengers[0].firstName) || '').trim();
  const greeting = firstName ? ('Welcome back, ' + firstName) : 'Welcome back';
  const t = document.createElement('div');
  t.className = 'welcome-toast';
  t.innerHTML = '<i data-lucide="hand"></i><span>' + greeting + '</span>';
  document.body.appendChild(t);
  lucide.createIcons();
  // Defer to next frame so the transition runs.
  requestAnimationFrame(() => t.classList.add('on'));
  setTimeout(() => {
    t.classList.remove('on');
    setTimeout(() => t.remove(), 280);
  }, 3000);
  // Clean the URL so a refresh after toast dismissal doesn't show it again.
  params.delete('welcome');
  const cleanQs = params.toString();
  history.replaceState({}, '', location.pathname + (cleanQs ? '?' + cleanQs : ''));
}

/* ----- Helpers --------------------------------------------------------------- */
function applicant(){ return booking.visa.applicants[currentApplicantIdx]; }
function applicantPct(a){
  // 9 step contributions, weighted to reach ~100 when fully complete
  const f = a.formData || {};
  let pct = 0;
  // Step 1 — Personal
  if (f.title && f.firstName && f.lastName && f.gender && f.dob && f.marital && f.nationality && f.birthCountry && f.applyingFrom && f.email && f.mobile) pct += 11;
  // Step 2 — Passport (residency moved to Step 4 sub-step 1)
  const passportOk = f.passportNo && f.issueCountry && f.issueDate && f.expiryDate && f.passportType;
  if (passportOk) pct += 11;
  // Step 3 — Travel & History (passportRestrictions / recentTravel moved to Step 4 sub-step 4)
  const travelBaseOk = f.arrival && f.departure && f.prevUmrah && f.pastVisaYN && f.saudiRejected;
  const pastOk = f.pastVisaYN === 'No' || (f.pastVisaYN === 'Yes' && (f.pastVisa || []).length > 0);
  if (travelBaseOk && pastOk) pct += 11;
  // Step 4 — Visa questionnaire (4 sub-steps complete)
  const subOk = (typeof discSubReady === 'function')
    ? [1,2,3,4].every(n => discSubReady(n))
    : false;
  if (subOk) pct += 11;
  // Step 5 — Flight & Contact
  const flightOk = f.flightBooked === 'No' || (f.flightBooked === 'Yes' && f.inboundFlight && f.outboundFlight);
  const contactOk = f.contactEmail && f.contactPhone;
  if (f.flightBooked && flightOk && contactOk) pct += 11;
  // Step 6 — Travel Services (Hotel + Transfer + Ground)
  const hotelOk    = f.hotelBooked === 'No' || (f.hotelBooked === 'Yes' && f.hotelProvider && f.hotelCheckin && f.hotelCheckout && f.hotelPrice && f.hotelReservationNo);
  const transferOk = f.transferBooked === 'No' || (f.transferBooked === 'Yes' && f.transferProvider && f.transferTripNo && f.transferTripDate && f.transferTripPrice && f.transferTripCategory && f.transferVehicleMake && f.transferVehicleType && f.transferBookingId);
  const groundOk   = f.groundBooked === 'No' || (f.groundBooked === 'Yes' && f.groundOperator && f.groundServiceCategory && f.groundServiceCode && f.groundPrice);
  if (f.hotelBooked && f.transferBooked && f.groundBooked && hotelOk && transferOk && groundOk) pct += 11;
  // Step 7 — Documents (passport bio is auto-completed; only photo is required)
  if ((a.documents || []).includes('photo')) pct += 11;
  // Step 8 — Review (visited)
  if (a.currentStep >= 8) pct += 11;
  // Step 9 — Declaration submitted
  if (a.complete) pct += 12;
  return Math.min(100, pct);
}
function overallPct(){
  const apps = booking.visa.applicants;
  return Math.round(apps.reduce((s, a) => s + applicantPct(a), 0) / apps.length);
}
function val(k){ return (applicant().formData[k] || ''); }
function setVal(k, v){ applicant().formData[k] = v; }

/* ----- Render --------------------------------------------------------------- */
function render(){
  const a = applicant();
  if (a.currentStep < 1) a.currentStep = 1;
  const stepIdx = a.currentStep - 1;
  const step = STEPS[stepIdx];

  shell.innerHTML = `
    <aside class="side-progress">
      <h3>Application steps</h3>
      ${STEPS.map((s, i) => {
        const n = i + 1;
        const lockedDone = !!(a.locked && a.locked[n]);
        // Locked steps stay marked done in the sidebar even when the user is viewing them.
        const cls = (n < a.currentStep || (lockedDone && n !== a.currentStep))
          ? 'done'
          : n === a.currentStep
            ? (lockedDone ? 'done on' : 'on')
            : '';
        const ic = cls.includes('done') ? 'check' : (cls === 'on' ? s.icon : '');
        const subTxt = cls.includes('done')
          ? (lockedDone ? 'From booking' : 'Completed')
          : (cls === 'on' ? s.sub : 'Pending');
        return `
          <div class="side-step ${cls}" onclick="goTo(${n})" style="cursor:pointer">
            <div class="dot">${ic ? `<i data-lucide="${ic}"></i>` : n}</div>
            <div class="lbl">
              <div class="name">${n}. ${s.label}</div>
              <div class="sub">${subTxt}</div>
            </div>
          </div>
        `;
      }).join('')}
      <div class="booking-tag">
        Booking ref<strong>${booking.id}</strong>
        ${booking.packageName}
      </div>
    </aside>
    <main>
      ${renderApplicantBar()}
      <div class="wizard-card" id="wizardCard">${stepView(step.key)}</div>
    </main>
  `;
  lucide.createIcons();
  wireAutoSave();
  updateMobileProgress();
  wireMobileCta();
  flashSaved(false);
}

function renderApplicantBar(){
  const apps = booking.visa.applicants;
  if (apps.length <= 1) return ''; // Item 17 only relevant for 2+
  const tabs = apps.map((a, i) => {
    const cls = (i === currentApplicantIdx ? 'on ' : '') + (a.complete ? 'complete' : '');

/* ----- Step 4: Visa questionnaire (4-step internal sub-wizard) ----------- */
const DISC_SUB_LABELS = ['Family & residency','Security & legal','Military & affiliations','Health & travel'];

function stepDisclosures(){
  const f = applicant().formData;
  if (!f.disclosureSubStep || f.disclosureSubStep < 1 || f.disclosureSubStep > 4) f.disclosureSubStep = 1;
  // Guard: don't let users land on a sub-step they haven't unlocked yet (e.g. via stale state)
  const max = discMaxReachable();
  if (f.disclosureSubStep > max) f.disclosureSubStep = max;
  const sub = f.disclosureSubStep;
  const renderer = [discFamilyResidential, discSecurityLegal, discMilitary, discHealthPassport][sub - 1];
  const continueLabel = sub === 4 ? 'Save &amp; continue' : 'Continue';
  return `
    <h2>Step 4 — Visa questionnaire</h2>
    <p class="step-sub">A short 4-part questionnaire required by Saudi authorities. Please answer truthfully.</p>
    ${discProgressBar()}
    <div class="disc-substep" data-sub="${sub}" key="disc-sub-${sub}">
      ${renderer()}
    </div>
    <div class="disc-substep-nav">
      <button type="button" class="btn btn-disc-back" onclick="discSubBack()"><i data-lucide="arrow-left"></i> Back</button>
      <button type="button" class="btn btn-disc-continue" onclick="discSubNext()">${continueLabel} <i data-lucide="arrow-right"></i></button>
    </div>
  `;
}

function discProgressBar(){
  const sub = applicant().formData.disclosureSubStep || 1;
  const max = discMaxReachable();
  return `
    <div class="disc-progress" role="tablist" aria-label="Visa questionnaire progress">
      ${DISC_SUB_LABELS.map((l, i) => {
        const n = i + 1;
        const isDone = n < sub;
        const isCurrent = n === sub;
        const reachable = n <= max; // backward + completed-only-forward
        const cls = (isDone ? 'done' : '') + (isCurrent ? ' on' : '') + (reachable ? ' reachable' : '');
        const ic = isDone ? 'check' : '';
        const click = reachable ? `onclick="discSubGoTo(${n})"` : '';
        return `
          <div class="seg ${cls.trim()}" ${click} role="tab" aria-selected="${isCurrent}" aria-disabled="${!reachable}">
            <div class="bar"></div>
            <div class="meta">
              <span class="num">${ic ? `<i data-lucide="${ic}"></i>` : n}</span>
              <span class="label">${l}</span>
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

/* ----- Sub-wizard navigation helpers ------------------------------------- */
function discSubReady(n){
  const f = applicant().formData;
  const ynWithDetails = (k) => {
    if (!f[k]) return false;
    if (f[k] === 'Yes' && !(f[k + 'Details'] || '').trim()) return false;
    return true;
  };
  if (n === 1){
    const famOk = f.familyKsaYN === 'No' || (f.familyKsaYN === 'Yes' && f.familyKsaName && f.familyKsaRelation);
    const resOk = f.residesAbroad === 'No' || (f.residesAbroad === 'Yes' && f.permitNumber && f.permitExpiry);
    return !!(f.familyKsaYN && famOk && f.residesAbroad && resOk);
  }
  if (n === 2) return ['secPrison','secDeported','secTerror','secSmuggling'].every(ynWithDetails);
  if (n === 3) return ['milService','milMedia','milAffiliate'].every(ynWithDetails);
  if (n === 4){
    const hltOk = ['hltDisability','hltVaccinated','hltAgreeCert'].every(ynWithDetails);
    const passOk = ynWithDetails('passportRestrictions');
    const recentOk = f.recentTravelYN === 'No' || (f.recentTravelYN === 'Yes' && (f.recentTravel || []).length > 0);
    return !!(hltOk && passOk && f.recentTravelYN && recentOk);
  }
  return false;
}

function discMaxReachable(){
  // 1 + count of consecutive completed sub-steps (but never past 4)
  let n = 1;
  while (n <= 4 && discSubReady(n)) n++;
  return Math.min(4, n);
}

function discSubGoTo(n){
  const f = applicant().formData;
  const cur = f.disclosureSubStep || 1;
  if (n === cur) return;
  if (n < cur){
    // Backward jump always allowed
    f.disclosureSubStep = n;
  } else {
    // Forward jump only to a sub-step the user has unlocked (no skip-ahead)
    if (n > discMaxReachable()) return;
    f.disclosureSubStep = n;
  }
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function discSubBack(){
  const f = applicant().formData;
  const sub = f.disclosureSubStep || 1;
  if (sub > 1){
    f.disclosureSubStep = sub - 1;
    UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    // At sub-step 1 → fall back to outer wizard's previous step
    prev();
  }
}

function discSubNext(){
  if (!validateCurrent()) return;
  const f = applicant().formData;
  const sub = f.disclosureSubStep || 1;
  if (sub < 4){
    f.disclosureSubStep = sub + 1;
    UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    // Final sub-step → advance the outer wizard
    next();
  }
}

/* Lightweight in-place refresh of the segmented progress bar — avoids a full
   render() that would blur the active textarea while the user is typing. */
function refreshDiscProgress(){
  const stepKey = STEPS[applicant().currentStep - 1].key;
  if (stepKey !== 'disclosures') return;
  const host = document.querySelector('.wizard-card .disc-progress');
  if (!host) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = discProgressBar();
  const next = tmp.firstElementChild;
  host.replaceWith(next);
  if (window.lucide) lucide.createIcons();
}

/* ----- Flight search / select / change handlers ------------------------ */
function runFlightSearch(){
  const f = applicant().formData;
  const required = ['flightArrivalDate','flightArrivalId','flightDepartureDate','flightDepartureId'];
  let ok = true, firstInvalid = null;
  required.forEach(k => {
    const el = document.querySelector(`[data-k="${k}"]`);
    const wrapper = el ? el.closest('.field') : null;
    const empty = !f[k];
    if (wrapper) wrapper.classList.toggle('invalid', empty);
    if (empty){ ok = false; if (!firstInvalid) firstInvalid = el; }
  });
  if (!ok){
    if (firstInvalid && firstInvalid.scrollIntoView) firstInvalid.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  f.flightSearched = true;
  // Reset any previous selections so the user starts fresh from inbound list
  delete f.inboundFlight;
  delete f.outboundFlight;
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

function selectFlight(dir, idx){
  const f = applicant().formData;
  const src = dir === 'inbound' ? MOCK_INBOUND_FLIGHTS : MOCK_OUTBOUND_FLIGHTS;
  const g = src[idx];
  if (!g) return;
  if (dir === 'inbound')  f.inboundFlight  = { airline: g.airline, dest: g.dest, date: g.date, time: g.time };
  else                    f.outboundFlight = { airline: g.airline, dest: g.dest, date: g.date, time: g.time };
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

function changeFlight(dir){
  const f = applicant().formData;
  if (dir === 'inbound'){
    delete f.inboundFlight;
    delete f.outboundFlight; // outbound depends on inbound being chosen
  } else {
    delete f.outboundFlight;
  }
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

          <div class="field"><label>Service category <span class="req">*</span></label><input type="text" data-k="groundServiceCategory" value="${escapeHtml(val('groundServiceCategory'))}" placeholder="e.g. Shuttle"><span class="err"><i data-lucide="alert-circle"></i> Service category is required</span></div>
          <div class="field"><label>Service Code <span class="req">*</span></label><input type="text" data-k="groundServiceCode" value="${escapeHtml(val('groundServiceCode'))}" placeholder="e.g. GT-001"><span class="err"><i data-lucide="alert-circle"></i> Service code is required</span></div>
          <div class="field price"><label>Price <span class="req">*</span></label><input type="number" data-k="groundPrice" inputmode="numeric" min="0" value="${escapeHtml(val('groundPrice'))}" placeholder="0"><span class="err"><i data-lucide="alert-circle"></i> Price is required</span></div>
        </div>
      </div>
    </div>

    ${navRow(true, true)}
  `;
}

function stepDocs(){
  const a = applicant();
  // Passport bio-page is auto-captured on the traveller form (Step 04 / pax form)
  // so we mark it complete on enter and never let the user re-upload here.
  a.documents = a.documents || [];
  a.docFiles  = a.docFiles  || {};
  if (!a.documents.includes('bio')) a.documents.push('bio');
  if (!a.docFiles.bio){
    a.docFiles.bio = {
      name: 'Passport bio-page (captured at booking)',
      fromBooking: true
    };
  }
  const d = a.documents;
  const files = a.docFiles;

  const fmtSize = (b) => {
    if (!b && b !== 0) return '';
    if (b < 1024) return `${b} B`;
    return `${(b/1024).toFixed(1)} KB`;
  };

  // Locked passport row (read-only thumbnail + Completed badge + edit-link to step 1)
  const bioFile = files.bio || {};
  const lockedRow = `
    <div class="doc-label">
      Passport bio-page
      <span class="completed-badge"><i data-lucide="check"></i> Completed</span>
    </div>
    <div class="doc-row locked" aria-label="Passport bio-page, captured at booking">
      <div class="doc-thumb">
        ${bioFile.dataUrl
          ? `<img src="${escapeHtml(bioFile.dataUrl)}" alt="Passport bio-page preview">`
          : `<i data-lucide="book-open"></i>`}
      </div>
      <div class="doc-info">
        <div class="n">${escapeHtml(bioFile.name || 'Passport bio-page')}</div>
        <div class="meta"><i data-lucide="check-circle" style="width:11px;height:11px;display:inline-block;vertical-align:-1px;margin-right:2px"></i> Captured on traveller form</div>
      </div>
      <span class="doc-edit-link" onclick="goTo(1)" role="button" tabindex="0"><i data-lucide="pencil"></i> Edit on traveller form</span>
    </div>
  `;

  // Editable upload row (photo = required, supporting = optional)
  const uploadRow = (key, label, icon, hint, accept, required) => {
    const file = files[key] || {};
    const has  = d.includes(key);
    const reqMark = required ? `<span class="req">*</span>` : `<span class="optional-tag">Optional</span>`;
    return `
      <div class="doc-label">
        ${label} ${reqMark}
      </div>
      <div class="doc-row ${has ? 'ok filled' : ''}" ${has ? '' : `onclick="document.getElementById('docInp_${key}').click()"`}>
        ${has ? `
          <div class="doc-thumb">
            ${file.dataUrl && /^image\//.test(file.type || '')
              ? `<img src="${escapeHtml(file.dataUrl)}" alt="${escapeHtml(label)} preview">`
              : `<i data-lucide="${/pdf/i.test(file.type || file.name || '') ? 'file-text' : icon}"></i>`}
          </div>
          <div class="doc-info">
            <div class="n">${escapeHtml(file.name || label)}</div>
            <div class="meta">${fmtSize(file.size)} · Uploaded</div>
          </div>
          <button type="button" class="doc-remove" onclick="event.stopPropagation();removeDoc('${key}')" aria-label="Remove ${escapeHtml(label)}"><i data-lucide="x"></i></button>
        ` : `
          <i data-lucide="upload-cloud"></i>
          <div>Click to upload</div>
          <div class="meta">${hint}</div>
        `}
      </div>
      <div class="doc-error" id="docErr_${key}"><i data-lucide="alert-circle"></i> <span>This file is too large. Please upload a file under 50&nbsp;KB.</span></div>
      <input type="file" id="docInp_${key}" accept="${accept}" style="display:none" onchange="handleDocFile('${key}', this.files[0]); this.value='';">
    `;
  };

  return `
    <h2>Step 7 — Supporting documents</h2>
    <p class="step-sub">Your passport bio-page was captured at booking and is locked here. Add your photograph and any supporting document below.</p>

    <div class="upload-info-banner">
      <i data-lucide="info"></i>
      <div><strong>File size:</strong> All uploaded files must not exceed <strong>50&nbsp;KB</strong> in size.</div>
    </div>

    ${lockedRow}
    ${uploadRow('photo',      'Passport Photograph', 'camera',   'JPG or PNG · max 50 KB · white background',     'image/jpeg,image/png',                      true)}
    ${uploadRow('supporting', 'Supporting Document', 'file-text','JPG, PNG or PDF · max 50 KB',                   'image/jpeg,image/png,application/pdf',      false)}

    ${navRow(true, true)}
  `;
}

function stepReview(){
  const a = applicant();
  const f = a.formData;
  const personalFields = [
    { k: 'title',         l: 'Title' },
    { k: 'firstName',     l: 'First name' },
    { k: 'lastName',      l: 'Last name' },
    { k: 'middleName',    l: 'Middle name' },
    { k: 'gender',        l: 'Gender' },
    { k: 'dob',           l: 'Date of birth' },
    { k: 'marital',       l: 'Marital status' },
    { k: 'nationality',   l: 'Nationality' },
    { k: 'birthCountry',  l: 'Birth country' },
    { k: 'applyingFrom',  l: 'Applying from' },
    { k: 'email',         l: 'Email' },
    { k: '__mobile',      l: 'Phone', custom: () => f.mobile ? `${f.mobileCC || ''} ${f.mobile}`.trim() : '' }
  ];
  const passportFields = [
    { k: 'passportNo',    l: 'Passport number' },
    { k: 'issueCountry',  l: 'Issuing country' },
    { k: 'issueDate',     l: 'Issue date' },
    { k: 'expiryDate',    l: 'Expiry date' },
    { k: 'passportType',  l: 'Passport type' }
  ];
  const travelFields = [
    { k: 'arrival',       l: 'Arrival date' },
    { k: 'departure',     l: 'Departure date' },
    { k: 'prevUmrah',     l: 'Previous Umrah / Hajj?' },
    { k: 'pastVisaYN',    l: 'Previously issued visas?' },
    { k: 'saudiRejected', l: 'Saudi visa rejected before?' }
  ];
  // Disclosures — grouped by sub-step
  const discFamFields = [
    { k: 'familyKsaYN',   l: 'Relative in Saudi Arabia?' },
    { k: 'residesAbroad', l: 'Resides abroad?' }
  ];
  const discSecFields = [
    { k: 'secPrison',    l: 'Sentenced to prison?' },
    { k: 'secDeported',  l: 'Deported from any country?' },
    { k: 'secTerror',    l: 'Terrorism cases?' },
    { k: 'secSmuggling', l: 'Smuggling / money laundering?' }
  ];
  const discMilFields = [
    { k: 'milService',   l: 'Military / police service?' },
    { k: 'milMedia',     l: 'Media / political work?' },
    { k: 'milAffiliate', l: 'Terror-classed affiliation?' }
  ];
  const discHltFields = [
    { k: 'hltDisability',        l: 'Physical disabilities?' },
    { k: 'hltVaccinated',        l: 'Required vaccinations done?' },
    { k: 'hltAgreeCert',         l: 'Agree to present cert?' },
    { k: 'passportRestrictions', l: 'Passport restrictions?' },
    { k: 'recentTravelYN',       l: 'Travelled in last 6 mo.?' }
  ];
  const docs = a.documents || [];
  const hasBio   = docs.includes('bio');
  const hasPhoto = docs.includes('photo');
  const hasSupp  = docs.includes('supporting');
  const docOk    = hasBio && hasPhoto;
  const docSummary = docOk
    ? `Passport ✓ · Photograph ✓${hasSupp ? ' · Supporting ✓' : ''}`
    : (!hasPhoto ? 'Passport photograph missing' : 'Documents incomplete');
  const apps = booking.visa.applicants;
  const allComplete = apps.every(x => x.complete);
  const isLast = currentApplicantIdx === apps.length - 1;

  const rowsFrom = (fields, stepIdx) => fields.map(({k, l, custom}) => {
    const v = custom ? custom() : f[k];
    return `<div class="review-row"><span class="k">${l}</span><span class="v ${v ? '' : 'miss'}">${escapeHtml(v || 'Missing')}</span></div>`;
  }).join('');

  const recentSummary = (f.recentTravel || []).length
    ? (f.recentTravel || []).map(e => `${escapeHtml(e.country || '?')} (${escapeHtml(e.date || '')}, ${escapeHtml(e.length || '')})`).join('<br>')
    : (f.recentTravelYN === 'No' ? '—' : 'Missing entries');
  const pastVisaSummary = (f.pastVisa || []).length
    ? (f.pastVisa || []).map(e => `${escapeHtml(e.country || '?')} (${escapeHtml(e.date || '')}, ${escapeHtml(e.length || '')})`).join('<br>')
    : (f.pastVisaYN === 'No' ? '—' : 'Missing entries');
  const familySummary = (f.familyKsaYN === 'Yes')
    ? ((f.familyKsaName || f.familyKsaRelation)
        ? `${escapeHtml(f.familyKsaName || '?')} — ${escapeHtml(f.familyKsaRelation || '?')}`
        : 'Missing entries')
    : (f.familyKsaYN === 'No' ? '—' : 'Missing entries');
  const permitSummary = (f.residesAbroad === 'Yes')
    ? ((f.permitNumber || f.permitExpiry)
        ? `${escapeHtml(f.permitNumber || '?')} (expires ${escapeHtml(f.permitExpiry || '?')})`
        : 'Missing entries')
    : (f.residesAbroad === 'No' ? '—' : 'Missing entries');

  // Flight + Services summaries
  const flightSummary = (() => {
    if (f.flightBooked !== 'Yes') return '—';
    const ib = f.inboundFlight, ob = f.outboundFlight;
    if (!ib && !ob) return 'Yes — flights not yet selected';
    const parts = [];
    if (ib) parts.push(`Inbound: ${escapeHtml(ib.airline)} → ${escapeHtml(ib.dest)} (${escapeHtml(ib.date)}, ${escapeHtml(ib.time)})`);
    if (ob) parts.push(`Outbound: ${escapeHtml(ob.airline)} → ${escapeHtml(ob.dest)} (${escapeHtml(ob.date)}, ${escapeHtml(ob.time)})`);

  })();
  const hotelSummary = f.hotelBooked === 'Yes'
    ? `${escapeHtml(f.hotelProvider || '?')} (${escapeHtml(f.hotelCheckin || '?')} → ${escapeHtml(f.hotelCheckout || '?')}, ₦${escapeHtml(f.hotelPrice || '0')})`
    : '—';
  const transferSummary = f.transferBooked === 'Yes'
    ? `${escapeHtml(f.transferProvider || '?')} · ${escapeHtml(f.transferTripCategory || '?')} · ₦${escapeHtml(f.transferTripPrice || '0')}`
    : '—';
  const groundSummary = f.groundBooked === 'Yes'
    ? `${escapeHtml(f.groundOperator || '?')} · ${escapeHtml(f.groundServiceCategory || '?')} · ₦${escapeHtml(f.groundPrice || '0')}`
    : '—';
  const contactSummary = (f.contactEmail || f.contactPhone)
    ? `${escapeHtml(f.contactEmail || '')}${f.contactEmail && f.contactPhone ? ' · ' : ''}${escapeHtml(f.contactPhone || '')}`
    : 'Missing';

  return `
    <h2>Step 8 — Review your application</h2>
    <p class="step-sub">Check every section for ${escapeHtml(a.name)} before continuing to declaration &amp; submit.</p>

    <div class="review">
      <h4>Personal <a onclick="goTo(1)">Edit</a></h4>
      ${rowsFrom(personalFields, 1)}
    </div>

    <div class="review">
      <h4>Passport <a onclick="goTo(2)">Edit</a></h4>
      ${rowsFrom(passportFields, 2)}
    </div>

    <div class="review">
      <h4>Travel &amp; history <a onclick="goTo(3)">Edit</a></h4>
      ${rowsFrom(travelFields, 3)}
      <div class="review-row"><span class="k">Past visas</span><span class="v">${pastVisaSummary}</span></div>
    </div>

    <div class="review">
      <h4>Visa questionnaire <a onclick="goTo(4)">Edit</a></h4>
      ${rowsFrom(discFamFields, 4)}
      <div class="review-row"><span class="k">Relative in Saudi</span><span class="v">${familySummary}</span></div>
      <div class="review-row"><span class="k">Residence permit</span><span class="v">${permitSummary}</span></div>
      ${rowsFrom(discSecFields, 4)}
      ${rowsFrom(discMilFields, 4)}
      ${rowsFrom(discHltFields, 4)}
      <div class="review-row"><span class="k">Recent travel</span><span class="v">${recentSummary}</span></div>
    </div>

    <div class="review">
      <h4>Flight &amp; contact <a onclick="goTo(5)">Edit</a></h4>
      <div class="review-row"><span class="k">Flight booked?</span><span class="v ${f.flightBooked ? '' : 'miss'}">${escapeHtml(f.flightBooked || 'Missing')}</span></div>
      <div class="review-row"><span class="k">Flight details</span><span class="v">${flightSummary}</span></div>
      <div class="review-row"><span class="k">Contact</span><span class="v ${(f.contactEmail && f.contactPhone) ? '' : 'miss'}">${contactSummary}</span></div>
    </div>

    <div class="review">
      <h4>Travel services <a onclick="goTo(6)">Edit</a></h4>
      <div class="review-row"><span class="k">Accommodation</span><span class="v">${hotelSummary}</span></div>
      <div class="review-row"><span class="k">Airport transfer</span><span class="v">${transferSummary}</span></div>
      <div class="review-row"><span class="k">Ground transport</span><span class="v">${groundSummary}</span></div>
    </div>

    <div class="review">
      <h4>Documents <a onclick="goTo(7)">Edit</a></h4>
      <div class="review-row"><span class="k">Required documents</span><span class="v ${docOk ? '' : 'miss'}">${docSummary}</span></div>
    </div>

    ${apps.length > 1 ? `
      <div class="completion-card ${allComplete ? 'complete' : ''}">
        <i data-lucide="${allComplete ? 'check-circle' : 'users'}"></i>
        <div class="x">
          <strong>${apps.filter(x => x.complete).length} of ${apps.length} applicants complete</strong>
          <span>${allComplete ? 'All applicants ready — continue to declaration to submit.' : 'Mark this applicant complete and continue with the next applicant.'}</span>
        </div>
      </div>
    ` : ''}

    <div class="nav-row">
      <button class="btn btn-ghost" type="button" onclick="prev()"><i data-lucide="arrow-left"></i> Back</button>
      ${apps.length > 1 && !isLast ? `
        <button class="btn btn-primary" type="button" id="completeApplicantBtn">Mark complete &amp; continue <i data-lucide="arrow-right"></i></button>
      ` : `
        <button class="btn btn-primary" type="button" onclick="next()">Continue to declaration <i data-lucide="arrow-right"></i></button>
      `}
    </div>
  `;
}

/* ----- Step 9: Declaration + Submit (final step) ------------------------- */

  const allChecked = !!(f.declareAccurate && f.declareNoFalse && f.declareConsent);
  const checkRow = (key, label) => `
    <label class="declaration-row">
      <input type="checkbox" data-consent="${key}"${val(key) ? ' checked' : ''}>
      <span class="t">${escapeHtml(label)}</span>

  return `

    <p class="step-sub">Please confirm the following before submitting your visa application.</p>

    <div class="declaration-card">
      ${checkRow('declareAccurate', 'I confirm that all information provided is accurate and complete.')}
      ${checkRow('declareNoFalse',  'I understand that providing false information may result in visa rejection.')}
      ${checkRow('declareConsent',  'I consent to my information being shared with Saudi authorities for visa processing.')}
    </div>

    <button type="button" class="btn-submit-app${allChecked ? '' : ''}" id="submitAppBtn"${allChecked ? '' : ' disabled'} onclick="handleSubmit()">
      <i data-lucide="send"></i><span>Submit Application</span><span class="spin" aria-hidden="true"></span>
    </button>

    <div class="nav-row" style="margin-top:18px">
