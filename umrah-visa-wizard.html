}

function navRow(showBack, showNext){
  return `
    <div class="nav-row">
      ${showBack ? `<button class="btn btn-ghost" type="button" onclick="prev()"><i data-lucide="arrow-left"></i> Back</button>` : `<span></span>`}
      ${showNext ? `<button class="btn btn-primary" type="button" onclick="next()">Save &amp; continue <i data-lucide="arrow-right"></i></button>` : ''}
    </div>
  `;
}

/* ----- Unlock a pre-filled step so the user can edit captured booking data ---- */
function unlockStep(stepNum){
  const a = applicant();
  if (!a.locked) a.locked = {};
  a.locked[stepNum] = false;
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

/* ----- Mobile progress + sticky CTA wiring ---------------------------------- */
function updateMobileProgress(){
  const a = applicant();
  document.getElementById('mobStepOf').textContent = `Step ${a.currentStep} of ${STEPS.length}`;
  document.getElementById('mobStepName').textContent = STEPS[a.currentStep - 1].label;
  document.getElementById('mobApplicantTag').textContent = booking.visa.applicants.length > 1 ? `Applicant ${currentApplicantIdx + 1} of ${booking.visa.applicants.length}` : '';
  const pct = applicantPct(a);
  document.getElementById('mobFill').style.width = pct + '%';
  document.getElementById('mobPct').textContent = pct + '% complete';
  // Sync overall progress + currentStep on storage
  UmrahPortal.updateVisa(bookingId, { progress: overallPct(), currentStep: a.currentStep, applicants: booking.visa.applicants });
}

function wireMobileCta(){
  const a = applicant();
  const stepKey = STEPS[a.currentStep - 1].key;
  const isLastStep = a.currentStep === STEPS.length;
  const mobileCta = document.getElementById('mobileCta');
  const backBtn = document.getElementById('mobBackBtn');
  const nextBtn = document.getElementById('mobNextBtn');
  // The Declaration step (step 9) ships its own full-width Submit Application
  // button inside the declaration card, so we hide the sticky mobile CTA here
  // to avoid showing two Submit buttons on phones / tablets.
  if (stepKey === 'declare'){
    if (mobileCta) mobileCta.style.display = 'none';
    document.body.classList.remove('has-mobile-cta');
    return;
  }
  if (mobileCta) mobileCta.style.display = '';
  document.body.classList.add('has-mobile-cta');
  // On the disclosures step the back button is always visible (sub-step 1 falls
  // back to outer prev() inside discSubBack), so users always have a way out.
  if (stepKey === 'disclosures'){
    backBtn.style.visibility = 'visible';
    backBtn.onclick = discSubBack;
    const f = applicant().formData;
    const sub = f.disclosureSubStep || 1;
    nextBtn.innerHTML = (sub === 4 ? 'Save &amp; continue' : 'Continue') + ' <i data-lucide="arrow-right"></i>';
    nextBtn.onclick = discSubNext;
    lucide.createIcons();
    return;
  }
  backBtn.style.visibility = a.currentStep > 1 ? 'visible' : 'hidden';
  backBtn.onclick = prev;
  if (isLastStep){
    const apps = booking.visa.applicants;
    const isLast = currentApplicantIdx === apps.length - 1;
    if (apps.length > 1 && !isLast){
      nextBtn.innerHTML = 'Mark complete <i data-lucide="arrow-right"></i>';
      nextBtn.onclick = handleCompleteApplicant;
    } else {
      nextBtn.innerHTML = 'Submit <i data-lucide="send"></i>';
      nextBtn.onclick = handleSubmit;
    }
  } else {
    nextBtn.innerHTML = 'Save &amp; continue <i data-lucide="arrow-right"></i>';
    nextBtn.onclick = next;
  }
  lucide.createIcons();
}

/* ----- Auto-save & validation ---------------------------------------------- */
function wireAutoSave(){
  document.querySelectorAll('[data-k]').forEach(el => {
    el.addEventListener('input', debounce(() => {
      setVal(el.dataset.k, el.value);
      // Keep applicant.name in sync with first/last
      if (el.dataset.k === 'firstName' || el.dataset.k === 'lastName'){
        const f = applicant().formData;
        const newName = `${f.firstName || ''} ${f.lastName || ''}`.trim();
        if (newName) applicant().name = newName;
      }
      UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
      flashSaved(true);
      updateMobileProgress();
      refreshDiscProgress();
    }, 350));
    el.addEventListener('blur', () => {
      const wrapper = el.closest('.field');
      if (wrapper && el.value) wrapper.classList.remove('invalid');
    });
  });
  // Y/N toggle groups
  document.querySelectorAll('.yn-group').forEach(group => {
    const key = group.dataset.yn;
    group.querySelectorAll('button[data-v]').forEach(btn => {
      btn.addEventListener('click', () => {
        setVal(key, btn.dataset.v);
        group.querySelectorAll('button[data-v]').forEach(b => b.classList.toggle('on', b === btn));
        // Toggle conditional reveal (.conditional panels, .cond-text inline reveals, and .svc-body service sections)
        document.querySelectorAll(`.conditional[data-cond="${key}"], .cond-text[data-cond="${key}"], .svc-body[data-cond="${key}"]`).forEach(c => {
          c.classList.toggle('show', btn.dataset.v === 'Yes');
          if (btn.dataset.v !== 'Yes') c.classList.remove('invalid');
        });
        // Clear invalid state
        const row = group.closest('.disc-row');
        if (row) row.classList.remove('invalid');
        UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
        flashSaved(true);
        updateMobileProgress();
        // Refresh the disclosures progress bar (segments may have unlocked)
        // without re-rendering the whole step (preserves textarea focus).
        refreshDiscProgress();
      });
    });
  });
  // Repeater inputs (live edit existing entry)
  document.querySelectorAll('[data-rep]').forEach(el => {
    el.addEventListener('input', debounce(() => {
      const key = el.dataset.rep;
      const i = parseInt(el.dataset.repI, 10);
      const field = el.dataset.repField;
      const arr = applicant().formData[key] || [];
      if (arr[i]){
        arr[i][field] = el.value;
        applicant().formData[key] = arr;
        UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
        flashSaved(true);
        updateMobileProgress();
      }
    }, 350));
  });
  // Repeater add buttons
  document.querySelectorAll('[data-rep-add]').forEach(btn => {
    btn.addEventListener('click', () => addRepeaterEntry(btn.dataset.repAdd));
  });
  // Repeater remove buttons
  document.querySelectorAll('[data-rep-rm]').forEach(btn => {
    btn.addEventListener('click', () => {
      removeRepeaterEntry(btn.dataset.repRm, parseInt(btn.dataset.repI, 10));
    });
  });
  // Consent checkboxes
  document.querySelectorAll('[data-consent]').forEach(cb => {
    cb.addEventListener('change', () => {
      setVal(cb.dataset.consent, cb.checked);
      const lbl = cb.closest('label');
      if (lbl) lbl.classList.toggle('checked', cb.checked);
      UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
      flashSaved(true);
      // Toggle the Declaration step's Submit button live as the 3 checkboxes change
      const submitAppBtn = document.getElementById('submitAppBtn');
      if (submitAppBtn){
        const f = applicant().formData;
        const allDec = !!(f.declareAccurate && f.declareNoFalse && f.declareConsent);
        submitAppBtn.disabled = !allDec;
      }
    });
  });
  // Applicant tabs
  document.querySelectorAll('.applicant-tab').forEach(tab => {
    tab.addEventListener('click', () => switchApplicant(parseInt(tab.dataset.i, 10)));
  });
  // Last-step buttons
  const completeBtn = document.getElementById('completeApplicantBtn');
  if (completeBtn) completeBtn.addEventListener('click', handleCompleteApplicant);
  const submitBtn = document.getElementById('submitAppBtn');
  if (submitBtn) submitBtn.addEventListener('click', handleSubmit);
}

function addRepeaterEntry(key){
  const a = applicant();
  const arr = a.formData[key] || [];
  if (arr.length >= 5) return;
  if (key === 'familyKsa') arr.push({ name: '', relation: '' });
  else arr.push({ country: '', date: '', length: '' });
  a.formData[key] = arr;
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

function removeRepeaterEntry(key, i){
  const a = applicant();
  const arr = a.formData[key] || [];
  arr.splice(i, 1);
  a.formData[key] = arr;
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

let saveTimer;
function flashSaved(show){
  const el = document.getElementById('savedIndicator');
  if (!el) return;
  if (show){
    el.classList.add('flash');
    el.querySelector('span').textContent = 'Saved';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { el.classList.remove('flash'); el.querySelector('span').textContent = 'Progress saved'; }, 1400);
  }
}
function debounce(fn, ms){ let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

function validateCurrent(){
  let ok = true, firstInvalid = null;
  const f = applicant().formData;
  const stepKey = STEPS[applicant().currentStep - 1].key;
  // Plain inputs/selects with data-k (skip those inside hidden conditionals, hidden cond-text reveals, or collapsed svc-body panels)
  document.querySelectorAll('[data-k]').forEach(el => {
    const wrapper = el.closest('.field');
    const cond = el.closest('.conditional, .cond-text');
    const svcBody = el.closest('.svc-body');
    if (cond && !cond.classList.contains('show')) return; // skip hidden conditional
    if (svcBody && !svcBody.classList.contains('show')) return; // skip collapsed service section
    // Skip optional fields explicitly marked as such
    if (el.dataset.optional === '1' || el.dataset.k === 'transferTripInstructions') return;
    const empty = !el.value || (el.value && el.value.trim() === '');
    if (wrapper) wrapper.classList.toggle('invalid', empty);
    // Mark cond-text invalid state (lighter UI than .field)
    if (cond && cond.classList.contains('cond-text')){
      cond.classList.toggle('invalid', empty);
    }
    if (empty){ ok = false; if (!firstInvalid) firstInvalid = el; }
  });
  // Y/N toggle groups (every disc-row)
  document.querySelectorAll('.disc-row').forEach(row => {
    const key = row.dataset.row;
    if (!key) return;
    const v = applicant().formData[key];
    const missing = !v;
    row.classList.toggle('invalid', missing);
    if (missing){
      ok = false;
      if (!firstInvalid) firstInvalid = row;
    }
  });
  // Service-section Y/N toggles (Flight, Hotel, Transfer, Ground) — every yn-group inside a .svc-toggle
  document.querySelectorAll('.svc-toggle .yn-group').forEach(group => {
    const key = group.dataset.yn;
    if (!key) return;
    const missing = !applicant().formData[key];
    const row = group.closest('.svc-toggle');
    if (row) row.classList.toggle('invalid', missing);
    if (missing){
      ok = false;
      if (!firstInvalid) firstInvalid = row || group;
    }
  });
  // Step-5 specific: when flightBooked=Yes, an inbound + outbound flight must be selected
  if (stepKey === 'flight' && f.flightBooked === 'Yes'){
    if (!f.inboundFlight || !f.outboundFlight){
      ok = false;
      if (!firstInvalid) firstInvalid = document.querySelector('.flight-search-actions, .svc-body');
    }
  }
  // Step-9 specific: all 3 declaration checkboxes must be ticked
  if (stepKey === 'declare'){
    if (!(f.declareAccurate && f.declareNoFalse && f.declareConsent)){
      ok = false;
      if (!firstInvalid) firstInvalid = document.querySelector('.declaration-card');
    }
  }
  // Repeater minimums (when YN parent is "Yes" and conditional is shown).
  // familyKsa no longer uses the repeater (it's now a single name+relation pair
  // gated by the standard data-k validation above).
  document.querySelectorAll('.conditional.show').forEach(cond => {
    const key = cond.dataset.cond;
    if (!key) return;
    const arrKey = (key === 'recentTravelYN') ? 'recentTravel'
                 : (key === 'pastVisaYN') ? 'pastVisa'
                 : null;
    if (!arrKey) return;
    const arr = applicant().formData[arrKey] || [];
    if (arr.length === 0){
      ok = false;
      if (!firstInvalid) firstInvalid = cond;
      cond.classList.add('invalid');
    } else {
      cond.classList.remove('invalid');
    }
  });
  if (firstInvalid){
    if (firstInvalid.focus) firstInvalid.focus({ preventScroll: false });
    firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return ok;
}

/* ----- Step navigation ----------------------------------------------------- */
function next(){
  if (!validateCurrent()) return;
  // Special case: docs step — passport bio is auto-completed; only the photograph is required.
  if (STEPS[applicant().currentStep - 1].key === 'docs'){
    if (!(applicant().documents || []).includes('photo')){
      alert('Please upload your passport photograph before continuing.');
      return;
    }
  }
  applicant().currentStep = Math.min(STEPS.length, applicant().currentStep + 1);
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prev(){
  applicant().currentStep = Math.max(1, applicant().currentStep - 1);
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goTo(step){
  applicant().currentStep = Math.max(1, Math.min(STEPS.length, step));
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ----- Document uploads (real file handling with 50KB cap) ---------------- */
const DOC_MAX_BYTES = 50 * 1024;
const DOC_ACCEPTED = {
  photo:      ['image/jpeg','image/png'],
  supporting: ['image/jpeg','image/png','application/pdf']
};

function showDocError(key, msg){
  const el = document.getElementById('docErr_' + key);
  if (!el) return;
  if (msg){
    const span = el.querySelector('span');
    if (span) span.textContent = msg;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function handleDocFile(key, file){
  if (!file) return;
  showDocError(key, '');
  // Type validation
  const allowed = DOC_ACCEPTED[key] || [];
  if (allowed.length && !allowed.includes(file.type)){
    const friendly = key === 'supporting'
      ? 'Please upload a JPG, PNG or PDF file.'
      : 'Please upload a JPG or PNG file.';
    showDocError(key, friendly);
    return;
  }
  // Size validation (50 KB cap)
  if (file.size > DOC_MAX_BYTES){
    showDocError(key, 'This file is too large. Please upload a file under 50 KB.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const a = applicant();
    a.docFiles = a.docFiles || {};
    a.docFiles[key] = {
      name:    file.name,
      size:    file.size,
      type:    file.type,
      dataUrl: ev.target.result
    };
    a.documents = a.documents || [];
    if (!a.documents.includes(key)) a.documents.push(key);
    UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
    render();
  };
  reader.onerror = () => {
    showDocError(key, 'Could not read this file. Please try another.');
  };
  reader.readAsDataURL(file);
}

function removeDoc(key){
  const a = applicant();
  a.documents = (a.documents || []).filter(k => k !== key);
  if (a.docFiles) delete a.docFiles[key];
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  render();
}

/* ----- Multi-applicant switching + completion gating ----------------------- */
function switchApplicant(i){
  if (i < 0 || i >= booking.visa.applicants.length) return;
  currentApplicantIdx = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleCompleteApplicant(){
  const f = applicant().formData;
  if (!f.contactEmail || !f.contactPhone){
    alert('Please fill the Contact Information (email and phone) before continuing.');
    return;
  }
  // Note: Terms & Conditions consent is captured on the checkout/pax page
  // before payment, so it's no longer gated here.
  // Verify the applicant has filled everything across all steps
  if (!isApplicantReady(applicant())){
    alert('This applicant is missing required fields or documents. Please go back and complete the previous steps.');
    return;
  }
  applicant().complete = true;
  UmrahPortal.updateVisa(bookingId, { applicants: booking.visa.applicants });
  // Move to the next incomplete applicant
  const apps = booking.visa.applicants;
  const next = apps.findIndex((x, i) => !x.complete && i > currentApplicantIdx);
  if (next !== -1) currentApplicantIdx = next;
  else {
    const earlier = apps.findIndex(x => !x.complete);
    if (earlier !== -1) currentApplicantIdx = earlier;
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleSubmit(){
  const f = applicant().formData;
  if (!f.contactEmail || !f.contactPhone){
    alert('Please fill the Contact Information (email and phone) on the Flight step before submitting.');
    return;
  }
  // Defensive: re-check the 3 declaration checkboxes
  if (!(f.declareAccurate && f.declareNoFalse && f.declareConsent)){
    alert('Please tick all 3 declaration statements before submitting.');
    return;
  }
  // Note: Terms & Conditions consent is captured on the checkout/pax page
  // before payment, so it's no longer gated here.
  if (!isApplicantReady(applicant())){
    alert('This applicant is missing required fields or documents. Please go back and complete the previous steps.');
    return;
  }
  applicant().complete = true;
  // Ensure ALL applicants are complete before submitting (Item 17 gate)
  const apps = booking.visa.applicants;
  const stillIncomplete = apps.filter(x => !x.complete);
  if (stillIncomplete.length){
    alert(`${stillIncomplete.length} other applicant${stillIncomplete.length > 1 ? 's' : ''} still need to be completed before submission. We'll move you to the next.`);
    UmrahPortal.updateVisa(bookingId, { applicants: apps });
    currentApplicantIdx = apps.findIndex(x => !x.complete);
    render();
    return;
  }
  // Show loading spinner on the in-step Submit button
  const btn = document.getElementById('submitAppBtn');
  if (btn){ btn.classList.add('loading'); btn.disabled = true; }
  // Generate a deterministic-looking application reference
  const submittedAt = new Date().toISOString();
  const applicationId = 'WK-VISA-' + Date.now().toString(36).toUpperCase();
  UmrahPortal.updateVisa(bookingId, {
    applicants: apps,
    submissionStatus: 'submitted',
    progress: 100,
    submittedAt: submittedAt,
    applicationId: applicationId
  });
  UmrahPortal.updateBooking(bookingId, { bookingStatus: 'visa_submitted' });
  // Brief delay so the spinner is visible, then navigate to the confirmation page
  setTimeout(() => {
    location.href = 'umrah-application-submitted.html?bookingId=' + bookingId;
  }, 700);
}

function isApplicantReady(a){
  const f = a.formData || {};
  const required = [
    'title','firstName','lastName','gender','dob','marital','nationality','birthCountry','applyingFrom','email','mobile',
    'passportNo','issueCountry','issueDate','expiryDate','passportType',
    'arrival','departure','prevUmrah','pastVisaYN','saudiRejected',
    // Step 4 — Visa questionnaire (4 sub-steps)
    'familyKsaYN','residesAbroad',
    'secPrison','secDeported','secTerror','secSmuggling',
    'milService','milMedia','milAffiliate',
    'hltDisability','hltVaccinated','hltAgreeCert',
    'passportRestrictions','recentTravelYN',
    // Step 5 — Flight + Contact
    'flightBooked','contactEmail','contactPhone',
    // Step 6 — Travel Services Y/N gates
    'hotelBooked','transferBooked','groundBooked'
  ];
  if (!required.every(k => !!f[k])) return false;
  // Conditional requirements
  if (f.residesAbroad === 'Yes' && (!f.permitNumber || !f.permitExpiry)) return false;
  if (f.familyKsaYN === 'Yes' && (!f.familyKsaName || !f.familyKsaRelation)) return false;
  if (f.recentTravelYN === 'Yes' && (f.recentTravel || []).length === 0) return false;
  if (f.pastVisaYN === 'Yes' && (f.pastVisa || []).length === 0) return false;
  // "Provide more information" required when any disclosure Y/N is "Yes"
  const ynDetails = ['secPrison','secDeported','secTerror','secSmuggling',
                     'milService','milMedia','milAffiliate',
                     'hltDisability','hltVaccinated','hltAgreeCert',
                     'passportRestrictions'];
  for (const k of ynDetails){
    if (f[k] === 'Yes' && !(f[k + 'Details'] || '').trim()) return false;
  }
  // Step 5 — Flight: when "Yes", an inbound + outbound must be selected
  if (f.flightBooked === 'Yes' && (!f.inboundFlight || !f.outboundFlight)) return false;
  // Step 6 — Travel Services: when "Yes", required fields per section
  if (f.hotelBooked === 'Yes'){
    if (!f.hotelProvider || !f.hotelCheckin || !f.hotelCheckout || !f.hotelPrice || !f.hotelReservationNo) return false;
  }
  if (f.transferBooked === 'Yes'){
    if (!f.transferProvider || !f.transferTripNo || !f.transferTripDate || !f.transferTripPrice ||
        !f.transferTripCategory || !f.transferVehicleMake || !f.transferVehicleType || !f.transferBookingId) return false;
  }
  if (f.groundBooked === 'Yes'){
    if (!f.groundOperator || !f.groundServiceCategory || !f.groundServiceCode || !f.groundPrice) return false;
  }
  // Documents: passport bio is auto-completed; only the photograph is required.
  if (!(a.documents || []).includes('photo')) return false;
  // Step 9 — Declaration: all 3 checkboxes ticked
  if (!(f.declareAccurate && f.declareNoFalse && f.declareConsent)) return false;
  return true;
}

function saveAndExit(){
  // Auto-save already on blur/input — just navigate home. The user can return
  // anytime via Manage Application (umrah-signin.html) using their Booking ID.
  location.href = 'saudi-packages.html';
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
