<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optional Add-ons — Umrah | Wakanow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',system-ui,sans-serif;font-size:16px;color:#1E3138;background:#EEF2F4;min-height:100vh;line-height:1.55}
h1,h2,h3,h4{font-family:'Rubik',system-ui,sans-serif;font-weight:700;line-height:1.25}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
:root{--primary:#08A5E3;--primary-dark:#0789BF;--primary-light:#E8F6FD;--navy:#0F2A33;--orange:#F58220;--orange-dark:#E07318;--green:#27AE60;--gray-100:#F2F3F5;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--radius:10px;--radius-lg:14px;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 20px rgba(0,0,0,.08);--ease:.22s cubic-bezier(.4,0,.2,1)}

.topbar{background:var(--navy);color:#fff;padding:16px 40px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.go-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:13px;padding:8px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:var(--ease)}
.go-back:hover{background:rgba(255,255,255,.18)}
.go-back i{width:14px;height:14px}
.topbar h1{font-size:22px;color:#fff}
.steps{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.step{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.55);font-size:12px;white-space:nowrap}
.step-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.18);color:rgba(255,255,255,.65);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step.done .step-num{background:rgba(255,255,255,.85);color:var(--navy)}
.step.on{color:#fff;font-weight:600}
.step.on .step-num{background:var(--primary);color:#fff}
.step-dash{color:rgba(255,255,255,.25)}

.shell{padding:22px 40px 60px;display:grid;grid-template-columns:1fr 340px;gap:22px;align-items:start}
@media(max-width:1024px){ .shell{grid-template-columns:1fr;padding:20px} }

.page-head{background:#fff;border-radius:var(--radius-lg);padding:18px 24px;box-shadow:var(--shadow-sm);margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.page-head h2{font-size:18px;color:var(--navy);margin-bottom:2px}
.page-head .sub{font-size:13px;color:var(--gray-500)}
.btn-skip{font-size:12px;color:var(--gray-500);padding:8px 14px;border-radius:8px;border:1px solid var(--gray-200);background:#fff;transition:var(--ease);font-weight:500}
.btn-skip:hover{background:var(--gray-100);color:var(--navy)}

.section-group{margin-bottom:22px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 2px}
.section-head .dot{width:28px;height:28px;border-radius:8px;background:var(--primary-light);color:var(--primary);display:inline-flex;align-items:center;justify-content:center}
.section-head .dot i{width:15px;height:15px}
.section-head h3{font-size:15px;color:var(--navy);font-weight:700}
.section-head .count{font-size:11px;color:var(--gray-500);font-weight:500;margin-left:auto}

.ad-list{display:flex;flex-direction:column;gap:12px}
.ad-card{background:#fff;border-radius:var(--radius-lg);padding:18px 22px;box-shadow:var(--shadow-sm);display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;border:2px solid transparent;transition:var(--ease)}
.ad-card:hover{box-shadow:var(--shadow-md)}
.ad-card.selected{border-color:var(--primary)}
.ad-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-light);color:var(--primary);display:inline-flex;align-items:center;justify-content:center}
.ad-icon i{width:20px;height:20px}
.ad-body .cat{font-size:10px;color:var(--primary-dark);background:var(--primary-light);font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.ad-body h4{font-size:15px;color:var(--navy);margin-bottom:3px}
.ad-body p{font-size:12px;color:var(--gray-600);line-height:1.5}
.ad-pick{text-align:right;min-width:150px}
.ad-pick .amt{font-size:17px;font-weight:700;color:var(--orange);font-variant-numeric:tabular-nums;margin-bottom:6px}
.ad-pick small{font-size:11px;color:var(--gray-500);display:block;margin-bottom:6px}
.btn-pick{background:#fff;border:1.5px solid var(--orange);color:var(--orange);font-size:12px;font-weight:700;padding:9px 22px;border-radius:8px;transition:var(--ease)}
.btn-pick:hover{background:var(--orange);color:#fff}
.btn-pick.on{background:var(--green);border-color:var(--green);color:#fff}

.side{display:flex;flex-direction:column;gap:16px;position:sticky;top:20px}
.cart-card{background:#fff;border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-sm)}
.cart-card h3{font-size:16px;color:var(--navy);margin-bottom:12px}
.cart-section{padding:10px 0;border-bottom:1px solid var(--gray-200)}
.cart-section:last-of-type{border-bottom:none}
.cart-label{font-size:12px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.cart-item{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:var(--navy);padding:3px 0}
.cart-item .amt{font-weight:600;font-variant-numeric:tabular-nums}
.cart-item.muted{color:var(--gray-500);font-style:italic;font-size:12px}
.cart-total{display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:1.5px solid var(--gray-200)}
.cart-total .l{font-size:13px;font-weight:700;color:var(--navy)}
.cart-total .amt{font-size:18px;font-weight:700;color:var(--orange);font-variant-numeric:tabular-nums}
.btn-continue{width:100%;margin-top:14px;padding:13px;background:var(--orange);color:#fff;font-size:13px;font-weight:600;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--ease)}
.btn-continue:hover{background:var(--orange-dark);box-shadow:0 6px 16px rgba(245,130,32,.28)}
.btn-continue i{width:15px;height:15px}
</style>
</head>
<body>

<header class="topbar">
  <button class="go-back" onclick="location.href='umrah-ground.html'">
    <i data-lucide="arrow-left"></i> Go Back
  </button>
  <h1>Optional Add-ons</h1>
  <div class="steps">
    <div class="step done"><span class="step-num">✓</span> Ground</div>
    <span class="step-dash">—</span>
    <div class="step on"><span class="step-num">5</span> Add-ons</div>
    <span class="step-dash">—</span>
    <div class="step"><span class="step-num">6</span> Review</div>
    <span class="step-dash">—</span>
    <div class="step"><span class="step-num">7</span> Pay</div>
  </div>
</header>

<div class="shell">
  <main>
    <div class="page-head">
      <div>
        <h2>Enhance your trip with optional add-ons</h2>
        <p class="sub">Pick any extras you'd like — or skip and go straight to review.</p>
      </div>
      <button class="btn-skip" onclick="goNext()">Skip this step →</button>
    </div>

    <div class="section-group">
      <div class="section-head">
        <span class="dot"><i data-lucide="sparkles"></i></span>
        <h3>Additional Services</h3>
        <span class="count" id="addlCount"></span>
      </div>
      <div class="ad-list" id="addlList"></div>
    </div>

    <div class="section-group">
      <div class="section-head">
        <span class="dot"><i data-lucide="book-open"></i></span>
        <h3>Enrichment Services</h3>
        <span class="count" id="enrCount"></span>
      </div>
      <div class="ad-list" id="enrList"></div>
    </div>
  </main>

  <aside class="side">
    <div class="cart-card">
      <h3>Your Cart</h3>
      <div class="cart-section"><div class="cart-label">Flight</div><div id="cartFlight"></div></div>
      <div class="cart-section"><div class="cart-label">Hotels</div><div id="cartHotels"></div></div>
      <div class="cart-section"><div class="cart-label">Ground services</div><div id="cartGround"></div></div>
      <div class="cart-section"><div class="cart-label">Add-ons</div><div id="cartAddons"><div class="cart-item muted">None selected</div></div></div>
      <div class="cart-total"><span class="l">Trip Total</span><span class="amt" id="cartTotal">₦0</span></div>
      <button class="btn-continue" onclick="goNext()">Review Cart <i data-lucide="arrow-right"></i></button>
    </div>
  </aside>
</div>

<script src="umrah-data.js"></script>
<script>
lucide.createIcons();
const cart = UmrahData.getCart();
if (cart.mode !== 'custom') { cart.mode = 'custom'; UmrahData.saveCart(cart); }

const ICONS = { Enrichment:'book-open', Extras:'gift', Transportation:'car', Protection:'shield-check' };

function cardHtml(a) {
  const on = (cart.addonIds || []).includes(a.id);
  return `
    <article class="ad-card ${on ? 'selected' : ''}">
      <div class="ad-icon"><i data-lucide="${ICONS[a.category] || 'sparkles'}"></i></div>
      <div class="ad-body">
        <span class="cat">${a.category}</span>
        <h4>${a.name}</h4>
        <p>${a.desc}</p>
      </div>
      <div class="ad-pick">
        <div class="amt">${UmrahData.ngn(a.price)}</div>
        <small>per person</small>
        <button class="btn-pick ${on ? 'on' : ''}" onclick="toggle('${a.id}')">${on ? 'Added' : 'Add'}</button>
      </div>
    </article>`;
}

function renderAddons() {
  const additional = UmrahData.ADDONS.filter(a => a.category !== 'Enrichment');
  const enrichment = UmrahData.ADDONS.filter(a => a.category === 'Enrichment');
  const picked = new Set(cart.addonIds || []);
  const addlOn = additional.filter(a => picked.has(a.id)).length;
  const enrOn = enrichment.filter(a => picked.has(a.id)).length;

  document.getElementById('addlList').innerHTML = additional.map(cardHtml).join('');
  document.getElementById('enrList').innerHTML = enrichment.map(cardHtml).join('');
  document.getElementById('addlCount').textContent = `${addlOn} of ${additional.length} selected`;
  document.getElementById('enrCount').textContent = `${enrOn} of ${enrichment.length} selected`;
  lucide.createIcons();
}

function toggle(id) {
  cart.addonIds = cart.addonIds || [];
  const i = cart.addonIds.indexOf(id);
  if (i >= 0) cart.addonIds.splice(i, 1);
  else cart.addonIds.push(id);
  UmrahData.saveCart(cart);
  renderAddons();
  renderCart();
}

function renderCart() {
  document.getElementById('cartFlight').innerHTML = cart.flightId
    ? (()=>{const f=UmrahData.findFlight(cart.flightId); return `<div class="cart-item"><span>${f.airline} ${f.code}</span><span class="amt">${UmrahData.ngn(f.price)}</span></div>`})()
    : `<div class="cart-item muted">None</div>`;

  const hotels = (cart.hotelIds || []).map(UmrahData.findHotel).filter(Boolean);
  document.getElementById('cartHotels').innerHTML = hotels.length
    ? hotels.map(h => { const n = (cart.hotelNights && cart.hotelNights[h.id]) || 5; return `<div class="cart-item"><span>${h.city}: ${h.name.split(' ')[0]}… · ${n}n</span><span class="amt">${UmrahData.ngn(h.pricePerNight * n)}</span></div>`; }).join('')
    : `<div class="cart-item muted">None</div>`;

  const grounds = (cart.groundIds || []).map(UmrahData.findGround).filter(Boolean);
  document.getElementById('cartGround').innerHTML = grounds.length
    ? grounds.map(g => `<div class="cart-item"><span>${g.name.split(' ').slice(0,2).join(' ')}…</span><span class="amt">${UmrahData.ngn(g.price)}</span></div>`).join('')
    : `<div class="cart-item muted">None</div>`;

  const adds = (cart.addonIds || []).map(UmrahData.findAddon).filter(Boolean);
  document.getElementById('cartAddons').innerHTML = adds.length
    ? adds.map(a => `<div class="cart-item"><span>${a.name.split(' ').slice(0,3).join(' ')}…</span><span class="amt">${UmrahData.ngn(a.price)}</span></div>`).join('')
    : `<div class="cart-item muted">None selected</div>`;

  document.getElementById('cartTotal').textContent = UmrahData.ngn(UmrahData.cartTotal(cart));
}

function goNext() { location.href = 'umrah-review.html'; }

renderAddons();
renderCart();
</script>
</body>
</html>
