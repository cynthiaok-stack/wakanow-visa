<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08A5E3">
<title>Profile — WakaEats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="wakatribe-lang.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;font-size:15px;color:#111827;line-height:1.55;background:#FAFAF5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3{font-family:'Inter',sans-serif;font-weight:800;letter-spacing:-.02em;color:#0F172A;line-height:1.15}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input{font-family:inherit;outline:none;font-size:15px}
a{text-decoration:none;color:inherit}

:root{
  --g-700:#08A5E3;--g-800:#0789BF;--g-100:#E8F6FD;--g-50:#F2FAFD;
  --ok-700:#27AE60;--ok-800:#1B7E45;--ok-100:#E8F8EF;
  --cream-50:#FAFAF5;--cream-100:#F5F3EE;--cream-200:#E9E6DD;
  --text:#111827;--muted:#6B7280;--muted-2:#9CA3AF;
  --border:#E5E4DF;--border-2:#EDEBE4;--red:#DC2626;--red-lt:#FEE2E2;
  --r:14px;--r-lg:20px;--r-xl:24px;--r-pill:999px;
}

.header{background:#fff;border-bottom:1px solid var(--cream-200);padding:calc(env(safe-area-inset-top,0) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10}
.header-brand{display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s}
.header-brand:hover .header-name{color:var(--g-700)}
.header-mark{width:36px;height:36px;border-radius:10px;background:var(--g-700);display:flex;align-items:center;justify-content:center}
.header-mark i{color:#fff;width:18px;height:18px}
.header-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:10px}
.role-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--r-pill);font-size:13px;font-weight:600;color:var(--text)}
.role-chip i{width:14px;height:14px;color:var(--muted)}
.back-link{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:500}
.back-link:hover{color:var(--g-700)}
.back-link i{width:16px;height:16px}

.wrap{padding:28px 20px 120px;max-width:620px;margin:0 auto}

.title-row{margin-bottom:28px}
.title-row h1{font-size:30px;font-weight:800;color:var(--text);margin-bottom:8px}
.title-row .meta{color:var(--muted);font-size:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.title-row .meta strong{color:var(--text);font-weight:600}
.pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:var(--r-pill);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;background:var(--g-100);color:var(--g-800)}

/* Card with form */
.form-card{background:#fff;border:1px solid var(--border-2);border-radius:var(--r-xl);padding:24px}
.field{margin-bottom:18px}
.field label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:block}
.field input,.field select{width:100%;height:50px;padding:0 16px;border:1px solid var(--border);border-radius:14px;background:var(--cream-100);font-size:15px;color:var(--text);transition:.2s}
.field input:focus,.field select:focus{border-color:var(--g-700);background:#fff;box-shadow:0 0 0 3px rgba(8,165,227,.18)}
.field input::placeholder{color:var(--muted-2)}

.btn-save{width:100%;height:52px;border-radius:14px;background:var(--g-700);color:#fff;font-weight:600;font-size:15px;transition:.2s;font-family:inherit;margin-top:6px}
.btn-save:hover{background:var(--g-800);transform:translateY(-1px);box-shadow:0 6px 18px rgba(8,165,227,.28)}

/* Danger zone */
.danger-card{background:#fff;border:1px solid var(--border-2);border-radius:var(--r-xl);padding:20px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.danger-card h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.danger-card p{font-size:13px;color:var(--muted)}
.btn-sign-out{padding:10px 18px;border-radius:12px;background:var(--cream-100);color:var(--text);font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap;font-family:inherit}
.btn-sign-out:hover{background:var(--red-lt);color:var(--red)}
.btn-sign-out i{width:14px;height:14px}

/* Tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--cream-200);padding:10px 0 calc(env(safe-area-inset-bottom,0) + 10px);display:flex;justify-content:space-around;z-index:30}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 16px;color:var(--muted);font-size:11px;font-weight:600;transition:.2s;flex:1;min-width:0}
.tab i{width:22px;height:22px}
.tab.active{color:var(--g-700)}

@media(min-width:760px){
  body{background:#F2F0E9}
  .wrap{padding:36px 28px 160px}
  .header{padding:18px 32px}
}
@media(max-width:420px){
  .header-right .back-link span{display:none}
  .role-chip{padding:8px 12px}
}
</style>
</head>
<body>

<header class="header">
  <a href="wakaeats-staff-home.html" class="header-brand">
    <div class="header-mark"><i data-lucide="utensils-crossed"></i></div>
    <div class="header-name">WakaEats</div>
  </a>
  <div class="header-right">
    <button class="role-chip" data-role-menu type="button"><i data-lucide="user"></i> Staff <i data-lucide="chevron-down"></i></button>
    <a href="wakaeats-login.html" class="back-link"><i data-lucide="log-out"></i> <span>Back to login</span></a>
  </div>
</header>

<div class="wrap">

  <div class="title-row">
    <h1>Profile</h1>
    <div class="meta">
      <span>Signed in as <strong>cynthiaok@wakanow.com</strong></span>
      <span class="pill">Employee</span>
    </div>
  </div>

  <form class="form-card" onsubmit="event.preventDefault();saved()">
    <div class="field">
      <label for="fullname">Full name</label>
      <input id="fullname" type="text" value="Cynthia Okejeh" autocomplete="name">
    </div>
    <div class="field">
      <label for="staffid">Staff ID</label>
      <input id="staffid" type="text" placeholder="e.g. WKN-1234">
    </div>
    <div class="field">
      <label for="dept">Department</label>
      <input id="dept" type="text" placeholder="e.g. Engineering">
    </div>
    <button type="submit" class="btn-save">Save changes</button>
  </form>

  <div class="danger-card">
    <div>
      <h4>Sign out</h4>
      <p>You can sign back in anytime with your email and password.</p>
    </div>
    <a href="wakaeats-login.html" class="btn-sign-out"><i data-lucide="log-out"></i> Sign out</a>
  </div>

</div>

<nav class="tabbar">
  <a href="wakaeats-staff-home.html" class="tab"><i data-lucide="home"></i> Home</a>
  <a href="wakaeats-my-qr.html" class="tab"><i data-lucide="qr-code"></i> My QR</a>
  <a href="wakaeats-staff-feedback.html" class="tab"><i data-lucide="message-square"></i> Feedback</a>
  <a href="wakaeats-staff-profile.html" class="tab active"><i data-lucide="user"></i> Profile</a>
</nav>

<script src="wakaeats-role.js" defer></script>
<script>
  lucide.createIcons();
  function saved(){
    const btn = document.querySelector('.btn-save');
    const orig = btn.textContent;
    btn.textContent = '✓ Saved';
    setTimeout(()=>btn.textContent = orig, 1600);
  }
</script>
</body>
</html>
